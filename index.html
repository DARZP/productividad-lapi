<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAPI Registro Productividad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDW-KIxM3m5QXnfzpOUmwhuLILLAk6u5rA",
            authDomain: "lapi-productividad.firebaseapp.com",
            projectId: "lapi-productividad",
            storageBucket: "lapi-productividad.firebasestorage.app",
            messagingSenderId: "1077149571149",
            appId: "1:1077149571149:web:e1423dde4a8de6f8562404"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.addDoc = addDoc;
        window.collection = collection;
        window.getDocs = getDocs;
        window.query = query;
        window.where = where;
        window.doc = doc;
        window.updateDoc = updateDoc;
    </script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .paso { transition: all 0.4s ease; }
    </style>
</head>
<body class="bg-gradient-to-br from-orange-400 to-orange-600 min-h-screen p-4 flex flex-col items-center pt-6 font-sans text-white">

    <datalist id="lista-medicos"></datalist>
    <datalist id="lista-empresas"></datalist>

    <div id="contenedor-principal" class="w-full max-w-md">
        
        <div class="glass p-6 rounded-3xl shadow-2xl mb-6">
            <h1 class="text-xl font-bold mb-6 text-center">Registro de Productividad</h1>

            <div id="paso-0" class="paso">
                <label class="block mb-2 font-medium">Fecha de Servicio</label>
                <input type="date" id="input-fecha" class="w-full p-3 mb-4 rounded-xl bg-white/20 text-orange-900 font-bold outline-none">
                
                <div class="flex gap-4 mb-4">
                    <div class="w-1/2">
                        <label class="block mb-2 font-medium text-sm">Hora Inicio</label>
                        <input type="time" id="input-hora-inicio" class="w-full p-3 rounded-xl bg-white/20 text-orange-900 font-bold outline-none">
                    </div>
                    <div class="w-1/2">
                        <label class="block mb-2 font-medium text-sm">Hora Fin</label>
                        <input type="time" id="input-hora-fin" class="w-full p-3 rounded-xl bg-white/20 text-orange-900 font-bold outline-none">
                    </div>
                </div>

                <label class="block mb-2 font-medium">Turno</label>
                <select id="input-turno" class="w-full p-3 mb-6 rounded-xl bg-white/20 text-orange-900 font-bold outline-none">
                    <option value="Matutino" class="text-black">Matutino</option>
                    <option value="Vespertino" class="text-black">Vespertino</option>
                </select>
                <button onclick="verificarRegistro()" class="w-full bg-white text-orange-600 font-bold py-3 rounded-xl">Siguiente</button>
            </div>

            <div id="paso-1" class="paso hidden">
                <label class="block mb-2 font-medium">1. Empresa</label>
                <input id="input-empresa" list="lista-empresas" class="w-full p-3 rounded-xl bg-white/20 border-none outline-none placeholder-white/70 uppercase" placeholder="Escribe la empresa...">
                <button onclick="irAPaso2()" class="mt-4 w-full bg-white text-orange-600 font-bold py-3 rounded-xl">Siguiente</button>
            </div>

            <div id="paso-2" class="paso hidden">
                <label class="block mb-4 font-medium">2. ¿Qué estudios se hicieron?</label>
                <div id="lista-checkbox-estudios" class="space-y-2 mb-4"></div>
                <button onclick="iniciarCapturaDetalle()" class="w-full bg-white text-orange-600 font-bold py-3 rounded-xl">Continuar</button>
            </div>

            <div id="paso-3" class="paso hidden">
                <div id="detalle-estudio-actual"></div>
            </div>

            <div id="paso-4" class="paso hidden">
                <h2 class="font-bold mb-4 text-center">Resumen Final</h2>
                <div id="resumen-contenido" class="text-sm bg-black/20 p-4 rounded-xl mb-4 space-y-2"></div>
                
                <label class="block mb-2 font-medium text-sm">Observaciones (Pendientes, Inconvenientes o Información Relevante)</label>
                <textarea id="input-observaciones" class="w-full p-3 mb-6 rounded-xl bg-white/20 border-none outline-none placeholder-white/60" rows="3" placeholder="Ej. 3 pacientes pendientes de ... por..., Dejó de Funcionar..., La cabina estaba alado de maquinaria..."></textarea>

                <div class="flex gap-2">
                    <button onclick="location.reload()" class="w-1/3 bg-red-500 font-bold py-4 rounded-xl shadow-lg">Reiniciar</button>
                    <button onclick="finalizar()" class="w-2/3 bg-green-500 font-bold py-4 rounded-xl shadow-lg">Confirmar</button>
                </div>
            </div>

            <div id="paso-edicion" class="paso hidden">
                <h2 class="text-xl font-bold mb-4 text-center">Modificando Folio: <span id="edit-folio-text" class="text-orange-200"></span></h2>
                
                <div class="space-y-4 text-sm">
                    <div class="bg-black/10 p-4 rounded-xl">
                        <label class="block mb-1 font-bold">Empresa:</label> 
                        <input id="edit-empresa" list="lista-empresas" class="w-full p-2 mb-3 rounded-lg bg-white/20 uppercase text-white outline-none">
                        
                        <label class="block mb-1 font-bold">Fecha:</label> 
                        <input type="date" id="edit-fecha" class="w-full p-2 mb-3 rounded-lg bg-white/20 text-white outline-none">
                        
                        <div class="flex gap-3 mb-3">
                            <div class="w-1/2">
                                <label class="block mb-1 font-bold">Inicio:</label>
                                <input type="time" id="edit-hora-inicio" class="w-full p-2 rounded-lg bg-white/20 text-white outline-none">
                            </div>
                            <div class="w-1/2">
                                <label class="block mb-1 font-bold">Fin:</label>
                                <input type="time" id="edit-hora-fin" class="w-full p-2 rounded-lg bg-white/20 text-white outline-none">
                            </div>
                        </div>
                        
                        <label class="block mb-1 font-bold">Turno:</label>
                        <select id="edit-turno" class="w-full p-2 rounded-lg bg-white/20 text-white outline-none">
                            <option value="Matutino" class="text-black">Matutino</option>
                            <option value="Vespertino" class="text-black">Vespertino</option>
                        </select>
                    </div>

                    <div class="bg-black/10 p-4 rounded-xl">
                        <h3 class="font-bold border-b border-white/20 pb-2 mb-3">Estudios Realizados</h3>
                        <div id="edit-detalles-container" class="space-y-3"></div>
                        <button onclick="agregarFilaEdicion()" class="w-full mt-4 bg-white/20 py-2 rounded-lg text-sm font-bold">+ Agregar otro estudio</button>
                    </div>

                    <div class="bg-black/10 p-4 rounded-xl">
                        <label class="block mb-1 font-bold">Observaciones:</label>
                        <textarea id="edit-observaciones" class="w-full p-2 rounded-lg bg-white/20 outline-none text-white placeholder-white/50" rows="2"></textarea>
                    </div>
                </div>

                <div class="flex gap-2 mt-6">
                    <button onclick="location.reload()" class="w-1/3 bg-red-500 font-bold py-3 rounded-xl shadow-lg">Cancelar</button>
                    <button onclick="guardarEdicion()" class="w-2/3 bg-green-500 font-bold py-3 rounded-xl shadow-lg">Guardar Cambios</button>
                </div>
            </div>

        </div>

        <div id="cuadro-edicion" class="glass p-4 rounded-2xl shadow-xl border-dashed border-2 border-white/30">
            <h2 class="text-xs font-bold uppercase mb-2 opacity-80 text-center">¿Editar registro previo?</h2>
            <div class="flex gap-2">
                <input id="input-edit-id" placeholder="Ej: 4812M" class="w-full p-2 rounded-lg bg-black/10 outline-none text-sm placeholder-white/50 uppercase">
                <button onclick="buscarRegistro()" class="bg-white/20 px-4 py-2 rounded-lg text-sm font-bold">Buscar</button>
            </div>
        </div>
    </div>

    <script>
        // Listas actualizadas y ordenadas alfabéticamente
        const empresas = [
  "ABBOTT SCOUTING",
  "AEROMEXICO",
  "ALMEXA",
  "ALMEXA MATU",
  "ALSTOM FERROVIARIA",
  "ALESSO CUAUTITLÁN",
  "AMCOR",
  "ASA CDMX",
  "AVANTOR",
  "BARCEL LERMA",
  "BD PLANTA",
  "BIMBO",
  "BIMBO AZCAPOTZALCO",
  "BIODIST",
  "CASA LUMBRE",
  "CASA LUMBRE AXOCOPAN",
  "CASA LUMBRE PUEBLA",
  "CEMEX ATOTONILCO",
  "CENTRO DE DISTRIBUCIÓN OXXO",
  "CLOROX",
  "COCA COLA",
  "COCA COLA EXPORT",
  "COCA COLA FEMSA TOLUCA",
  "COCA COLA MANUFACTURA PACIFICO",
  "COCA COLA OJUELOS",
  "COCA COLA TOLUCA",
  "COMPAÑÍA EDITORIAL",
  "COMSA",
  "CONSULTORES MEDICOS",
  "CORPORATIVO DL DENTILAB",
  "DICIPA",
  "DISTRIBUIDORA DE LÁCTEOS",
  "DLP MEDICAL",
  "DESARROLLO LOGÍSTICO",
  "GERDAU CORSA",
  "GRUPO COBRA",
  "GRUPO IND POSEIDON",
  "HOLCIM ATLACOMULCO",
  "HOLCIM CUAUTLA",
  "HOLCIM CUERNAVACA",
  "HOLCIM POLOTITLAN",
  "HUMANTOP",
  "IBERCHEM",
  "INDUSTRIAS METÁLICAS",
  "JOHNSON & JOHNSON",
  "JUGOS DEL VALLE",
  "KEUBIO",
  "LIVERPOOL",
  "LIVERPOOL PLAN",
  "MCORMICK",
  "MCORMICK MAT",
  "MERCK",
  "NYSCO",
  "OMEGA MÉXICO",
  "OXXO SMO",
  "PROMECO",
  "PROMECO MATU",
  "PROFILATEX",
  "PROXIMIDAD Y LOGÍSTICA CHALCO",
  "PROXIMIDAD Y LOGÍSTICA PACHUCA",
  "PROXIIDAD Y LOGÍSTICA MORELOS",
  "PRODUCTOS INNOVADOR",
  "PRODUCTOS RICH",
  "QUALITAS",
  "S C JOHNSON AND SON",
  "SCHNEIDER",
  "SEGURO AXA",
  "SEGURO INBURSA",
  "SEGURO ZURICH",
  "SIFATEC TULA 1",
  "SIFATEC TULA 2",
  "SNF FLOERGER",
  "SODEXO",
  "SODEXO CECAT SUR",
  "TACA",
  "TISK SOLUCIONES",
  "USK INTENACIONAL",
  "USME",
  "VALEANT"
].sort();
        const medicos = ["Susana Cayetano", "Diego Arias", "Patricia Kassandra", "Estefany Becherel", "Paulina Alba", "Mariana Gaviño", "Jose Alejandro", "Isabel Palma", "Dulce Maria", "Angeles Valenzuela", "Jose Juan", "Ingrid Bernal", "Giselle Vizuet", "Angello", "Elzy Chacon", "Alberto Gomez", "Yirelka Yeraldine", "Juan Manuel", "Angelica Itzel", "Mauricio Ruiz", "Lucero Cruz", "Jannet Alejandra", "Fernanda",  "Giovanni Mariano", "David Emmanuel", "Jazmin Morales!"].sort();
        const estudios = ["Espirometría", "Audiometría", "Historia Clínica", "Examen de Capacidad Visual", "Nórdico", "Seguro"];

        let seleccionados = [], registroFinal = [], indiceActual = 0;
        let horasCalculadas = 0;
        let editDocId = null; 

        document.getElementById('lista-empresas').innerHTML = empresas.map(e => `<option value="${e}">`).join('');
        document.getElementById('lista-medicos').innerHTML = medicos.map(m => `<option value="${m}">`).join('');
        document.getElementById('lista-checkbox-estudios').innerHTML = estudios.map(e => `<label class="flex items-center gap-3 p-3 bg-white/10 rounded-xl cursor-pointer"><input type="checkbox" value="${e}" class="w-5 h-5 accent-orange-500"> ${e}</label>`).join('');

        function calcularHoras(inicio, fin) {
            if(!inicio || !fin) return 0;
            const [h1, m1] = inicio.split(':').map(Number);
            const [h2, m2] = fin.split(':').map(Number);
            let diff = (h2 + m2/60) - (h1 + m1/60);
            if (diff < 0) diff += 24; 
            return parseFloat(diff.toFixed(2));
        }

        // ---------- LÓGICA DE REGISTRO NUEVO ----------
        
        function verificarRegistro() { 
            const fecha = document.getElementById('input-fecha').value;
            const hIni = document.getElementById('input-hora-inicio').value;
            const hFin = document.getElementById('input-hora-fin').value;
            if(!fecha || !hIni || !hFin) return alert("Completa la fecha y los horarios de inicio y fin.");
            
            horasCalculadas = calcularHoras(hIni, hFin);
            document.getElementById('paso-0').classList.add('hidden'); 
            document.getElementById('paso-1').classList.remove('hidden'); 
            document.getElementById('cuadro-edicion').classList.add('hidden'); 
        }
        
        function irAPaso2() { if(document.getElementById('input-empresa').value) { document.getElementById('paso-1').classList.add('hidden'); document.getElementById('paso-2').classList.remove('hidden'); } else alert("Selecciona empresa"); }
        
        function iniciarCapturaDetalle() {
            seleccionados = Array.from(document.querySelectorAll('#lista-checkbox-estudios input:checked')).map(i => i.value);
            if(seleccionados.length === 0) return alert("Selecciona un estudio");
            indiceActual = 0; mostrarDetalleEstudio();
        }

        function mostrarDetalleEstudio() {
            document.getElementById('paso-2').classList.add('hidden');
            document.getElementById('paso-3').classList.remove('hidden');
            const est = seleccionados[indiceActual];
            document.getElementById('detalle-estudio-actual').innerHTML = `
                <h3 class="font-bold text-lg mb-4 text-orange-200">Estudio: ${est}</h3>
                <div id="lista-medicos-detalle" class="space-y-3 mb-4"></div>
                <button onclick="agregarFilaMedico()" class="w-full bg-white/20 py-2 rounded-lg mb-4">+ Agregar médico</button>
                <button onclick="guardarDetalle('${est}')" class="w-full bg-white text-orange-600 font-bold py-3 rounded-xl">${indiceActual < seleccionados.length - 1 ? 'Siguiente Estudio' : 'Ver Resumen'}</button>
            `;
            agregarFilaMedico();
        }

        function agregarFilaMedico() {
            const div = document.createElement('div');
            div.className = "flex gap-2";
            div.innerHTML = `<input list="lista-medicos" placeholder="Médico" class="med-name w-full p-2 rounded bg-white/20 outline-none placeholder-white/50">
                             <input type="number" min="1" placeholder="Cant." class="med-cant w-1/3 p-2 rounded bg-white/20 outline-none placeholder-white/50">`;
            document.getElementById('lista-medicos-detalle').appendChild(div);
        }

        function guardarDetalle(estudio) {
            let errorValidacion = false;
            let hayDatos = false;

            document.querySelectorAll('#lista-medicos-detalle > div').forEach(fila => {
                const medico = fila.querySelector('.med-name').value;
                const cant = parseInt(fila.querySelector('.med-cant').value);
                if(medico || !isNaN(cant)) hayDatos = true;
                if(hayDatos && (!medico || isNaN(cant) || cant < 1)) errorValidacion = true;
                else if (medico && cant > 0) registroFinal.push({ estudio, medico, cant });
            });

            if(errorValidacion || !hayDatos) return alert("Por favor asigna médicos válidos y cantidades mayores a 0.");
            if(indiceActual < seleccionados.length - 1) { indiceActual++; mostrarDetalleEstudio(); } 
            else mostrarResumen();
        }

        function mostrarResumen() {
            document.getElementById('paso-3').classList.add('hidden');
            document.getElementById('paso-4').classList.remove('hidden');
            let html = `<p><b>Fecha:</b> ${document.getElementById('input-fecha').value}</p>
                        <p><b>Horas Laboradas:</b> ${horasCalculadas} hrs</p>
                        <p><b>Empresa:</b> ${document.getElementById('input-empresa').value.toUpperCase()}</p>`;
            registroFinal.forEach(item => html += `<div class="border-t border-white/20 pt-1 mt-1"><b>${item.estudio}</b>: ${item.medico} (${item.cant})</div>`);
            document.getElementById('resumen-contenido').innerHTML = html;
        }

        async function finalizar() {
            const numAleatorio = Math.floor(1000 + Math.random() * 9000); 
            const folio = numAleatorio + document.getElementById('input-turno').value[0].toUpperCase();
            
            const empresaF = document.getElementById('input-empresa').value.toUpperCase();
            const observaciones = document.getElementById('input-observaciones').value;

            try {
                await window.addDoc(window.collection(window.db, "registros"), {
                    folio, 
                    fecha: document.getElementById('input-fecha').value, 
                    horaInicio: document.getElementById('input-hora-inicio').value,
                    horaFin: document.getElementById('input-hora-fin').value,
                    horasLaboradas: horasCalculadas,
                    turno: document.getElementById('input-turno').value,
                    empresa: empresaF, 
                    detalles: registroFinal, 
                    observaciones: observaciones,
                    timestamp: new Date()
                });
                alert("Registro enviado exitosamente, Guarda el Folio. Será necesario en caso de correcciones. FOLIO:" + folio);
                location.reload();
            } catch(e) { alert("Error al enviar: " + e); }
        }

        // ---------- LÓGICA DE EDICIÓN ----------

        async function buscarRegistro() { 
            const folioInput = document.getElementById('input-edit-id').value.trim().toUpperCase();
            if(!folioInput) return alert("Ingresa un folio válido.");
            
            try {
                const q = window.query(window.collection(window.db, "registros"), window.where("folio", "==", folioInput));
                const qs = await window.getDocs(q);
                
                if(qs.empty) {
                    alert("No se encontró ningún registro con el folio: " + folioInput);
                    return;
                }
                
                let dataExtraida;
                qs.forEach(doc => { 
                    editDocId = doc.id; 
                    dataExtraida = doc.data(); 
                });
                
                abrirEditor(dataExtraida);
            } catch(e) {
                alert("Error de conexión al buscar: " + e);
            }
        }

        function abrirEditor(data) {
            document.getElementById('paso-0').classList.add('hidden');
            document.getElementById('cuadro-edicion').classList.add('hidden');
            document.getElementById('paso-edicion').classList.remove('hidden');

            document.getElementById('edit-folio-text').innerText = data.folio;
            document.getElementById('edit-empresa').value = data.empresa;
            document.getElementById('edit-fecha').value = data.fecha;
            document.getElementById('edit-hora-inicio').value = data.horaInicio;
            document.getElementById('edit-hora-fin').value = data.horaFin;
            document.getElementById('edit-turno').value = data.turno;
            document.getElementById('edit-observaciones').value = data.observaciones || '';

            document.getElementById('edit-detalles-container').innerHTML = '';
            if(data.detalles && data.detalles.length > 0){
                data.detalles.forEach(d => agregarFilaEdicion(d.estudio, d.medico, d.cant));
            } else {
                agregarFilaEdicion(); 
            }
        }

        function agregarFilaEdicion(estudio = '', medico = '', cant = '') {
            const div = document.createElement('div');
            div.className = "flex gap-2 items-center bg-black/20 p-2 rounded-lg edit-fila";
            
            const opcionesEstudios = estudios.map(e => `<option value="${e}" class="text-black" ${e === estudio ? 'selected' : ''}>${e}</option>`).join('');
            
            div.innerHTML = `
                <select class="edit-est w-1/3 p-2 rounded-md bg-white/20 text-white outline-none">
                    <option value="" disabled ${!estudio ? 'selected' : ''} class="text-gray-400">Estudio...</option>
                    ${opcionesEstudios}
                </select>
                <input list="lista-medicos" placeholder="Médico" value="${medico}" class="edit-med w-1/3 p-2 rounded-md bg-white/20 outline-none placeholder-white/50">
                <input type="number" min="1" placeholder="Cant." value="${cant}" class="edit-cant w-1/4 p-2 rounded-md bg-white/20 outline-none placeholder-white/50">
                <button onclick="this.parentElement.remove()" class="text-red-300 font-black px-2 hover:text-red-500 transition">X</button>
            `;
            document.getElementById('edit-detalles-container').appendChild(div);
        }

        async function guardarEdicion() {
            const empresa = document.getElementById('edit-empresa').value.toUpperCase();
            const fecha = document.getElementById('edit-fecha').value;
            const horaInicio = document.getElementById('edit-hora-inicio').value;
            const horaFin = document.getElementById('edit-hora-fin').value;
            const turno = document.getElementById('edit-turno').value;
            const observaciones = document.getElementById('edit-observaciones').value;

            if(!empresa || !fecha || !horaInicio || !horaFin) return alert("Completa los datos generales del encabezado.");

            let detallesNuevos = [];
            let hayErrorDetalles = false;

            document.querySelectorAll('.edit-fila').forEach(fila => {
                const est = fila.querySelector('.edit-est').value;
                const med = fila.querySelector('.edit-med').value;
                const cant = parseInt(fila.querySelector('.edit-cant').value);

                if(!est || !med || isNaN(cant) || cant < 1) hayErrorDetalles = true;
                else detallesNuevos.push({ estudio: est, medico: med, cant: cant });
            });

            if(hayErrorDetalles || detallesNuevos.length === 0) {
                return alert("Revisa que todos los estudios agregados tengan Tipo de Estudio, un Médico asignado y Cantidad válida.");
            }

            const horasCalculadasNuevas = calcularHoras(horaInicio, horaFin);

            try {
                const docRef = window.doc(window.db, "registros", editDocId);
                await window.updateDoc(docRef, {
                    empresa: empresa, 
                    fecha: fecha, 
                    horaInicio: horaInicio, 
                    horaFin: horaFin, 
                    turno: turno, 
                    observaciones: observaciones,
                    horasLaboradas: horasCalculadasNuevas,
                    detalles: detallesNuevos
                });
                
                alert("¡El registro se ha actualizado con éxito!");
                location.reload();
            } catch(e) {
                alert("Ocurrió un error al intentar actualizar: " + e);
            }
        }
    </script>
</body>
</html>
