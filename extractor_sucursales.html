<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extractor Sucursales LAPI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDW-KIxM3m5QXnfzpOUmwhuLILLAk6u5rA",
            authDomain: "lapi-productividad.firebaseapp.com",
            projectId: "lapi-productividad",
            storageBucket: "lapi-productividad.firebasestorage.app",
            messagingSenderId: "1077149571149",
            appId: "1:1077149571149:web:e1423dde4a8de6f8562404"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.addDoc = addDoc;
        window.collection = collection;
    </script>
</head>
<body class="bg-gradient-to-br from-slate-100 to-slate-200 font-sans text-slate-800 p-8 min-h-screen flex items-center justify-center">

    <div class="w-full max-w-2xl bg-white/70 backdrop-blur-lg border border-white/50 p-10 rounded-3xl shadow-xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-sky-700">⚙️ Carga Masiva de Sucursales</h1>
            <p class="text-slate-500 mt-2 text-sm">Sube tu archivo (Excel o CSV) con las columnas exactas:<br><b class="text-sky-600">Fecha | Mes | Sucursal | Paciente | Empresa | Estudio | Personal</b></p>
        </div>

        <div class="border-2 border-dashed border-sky-300 rounded-2xl p-8 text-center bg-white/50 transition hover:border-sky-500">
            <input type="file" id="archivosCarga" accept=".csv, .xlsx, .xls" class="block w-full max-w-sm mx-auto mb-6 text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-sky-50 file:text-sky-700 hover:file:bg-sky-100 cursor-pointer">
            
            <div class="flex gap-4 justify-center">
                <button id="btnProcesar" onclick="procesarArchivos()" class="bg-sky-600 hover:bg-sky-700 text-white font-bold py-3 px-6 rounded-xl shadow transition">1. Leer Archivo</button>
                <button id="btnSubir" onclick="subirAFirebase()" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-6 rounded-xl shadow transition hidden">2. Subir a Base de Datos</button>
            </div>
        </div>

        <div id="log" class="mt-6 bg-slate-800 text-green-400 p-4 rounded-xl font-mono text-xs h-64 overflow-y-auto hidden"></div>
    </div>

    <script>
        let datosListos = [];

        async function procesarArchivos() {
            const input = document.getElementById('archivosCarga');
            const logDiv = document.getElementById('log');
            if(input.files.length === 0) return alert("Selecciona un archivo Excel o CSV primero.");
            
            logDiv.classList.remove('hidden');
            logDiv.innerHTML = "Analizando archivo...<br>";
            datosListos = [];
            
            try {
                let data = await input.files[0].arrayBuffer();
                let wb = XLSX.read(data, {type:'array'});
                let sheet = wb.Sheets[wb.SheetNames[0]]; // Siempre toma la primera hoja
                let filas = XLSX.utils.sheet_to_json(sheet, {header:1, defval:""});
                
                // Empezamos en r=1 para saltarnos la fila 0 (los títulos de las columnas)
                for(let r=1; r<filas.length; r++){
                    let cols = filas[r];
                    if(cols.length < 7 || !cols[0] || String(cols[0]).trim() === "") continue; 
                    
                    // Formateo seguro de fecha por si Excel la manda como número serial
                    let fechaStr = cols[0];
                    if(typeof fechaStr === 'number') {
                        let d = new Date((fechaStr - (25567 + 2)) * 86400 * 1000);
                        fechaStr = d.toISOString().split('T')[0];
                    } else if (String(fechaStr).includes('/')) {
                        let p = String(fechaStr).split('/');
                        if(p.length === 3) fechaStr = `${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`;
                    }

                    datosListos.push({ 
                        tipo: "sucursal",
                        fecha: String(fechaStr).trim(),
                        mes: String(cols[1]).trim().toUpperCase(),
                        sucursal: String(cols[2]).trim().toUpperCase(), 
                        paciente: String(cols[3]).trim().toUpperCase(), 
                        empresa: String(cols[4]).trim().toUpperCase(), 
                        estudio: String(cols[5]).trim().toUpperCase(), 
                        medico: String(cols[6]).trim().toUpperCase(),
                        timestamp: new Date()
                    });
                }
            } catch(e) { 
                logDiv.innerHTML += `<span class="text-red-400">Error leyendo archivo: ${e}</span><br>`; 
            }
            
            logDiv.innerHTML += `Lectura completada. Se detectaron <b class="text-white">${datosListos.length}</b> registros válidos listos para subir.<br>`;
            document.getElementById('btnSubir').classList.remove('hidden');
        }

        async function subirAFirebase() {
            if(datosListos.length === 0) return alert("No hay datos para subir.");
            const logDiv = document.getElementById('log');
            const btn = document.getElementById('btnSubir');
            
            btn.disabled = true;
            btn.innerText = "Subiendo... no cierres la ventana";
            btn.classList.replace('bg-emerald-500', 'bg-slate-500');
            
            let exitosos = 0;
            // Subimos uno por uno para no saturar la red
            for(let reg of datosListos) {
                try {
                    await window.addDoc(window.collection(window.db, "registros"), reg);
                    exitosos++;
                    if(exitosos % 20 === 0) { // Actualiza el log cada 20 para no trabar el navegador
                        logDiv.innerHTML += `Progreso: ${exitosos} / ${datosListos.length} subidos...<br>`;
                        logDiv.scrollTop = logDiv.scrollHeight;
                    }
                } catch(e) {
                    logDiv.innerHTML += `<span class="text-red-400">Fallo en un registro: ${e}</span><br>`;
                }
            }
            
            logDiv.innerHTML += `<span class="text-white text-sm font-bold block mt-4">¡COMPLETADO! ${exitosos} registros integrados a la base de datos central.</span><br>`;
            btn.innerText = "¡Subida Exitosa!";
        }
    </script>
</body>
</html>
