    <script>
        let serviciosGlobales = [];
        let vistaActual = 'activo';
        let servicioParaReporte = null; 

        // 1. LÓGICA DE INTERFAZ Y PESTAÑAS
        window.filtrarVista = function(estado) {
            vistaActual = estado;
            ['activo', 'pausa', 'finalizado'].forEach(e => document.getElementById(`tab-${e}`).classList.remove('active'));
            document.getElementById(`tab-${estado}`).classList.add('active');
            renderizarLista();
        };

        window.abrirModal = function(id) {
            const modal = document.getElementById(`modal-${id}`);
            const card = document.getElementById(`modal-${id}-card`);
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); card.classList.remove('scale-95'); }, 10);
        };

        window.cerrarModal = function(id) {
            const modal = document.getElementById(`modal-${id}`);
            const card = document.getElementById(`modal-${id}-card`);
            modal.classList.add('opacity-0'); card.classList.add('scale-95');
            setTimeout(() => { modal.classList.add('hidden'); }, 300);
        };

        // 2. LÓGICA DE SERVICIOS Y AUTO-CIERRE
        window.guardarServicio = async function(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-guardar');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Guardando...'; btn.disabled = true;

            const payload = {
                nombreComercial: document.getElementById('s-comercial').value.toUpperCase().trim(),
                folio: document.getElementById('s-folio').value.toUpperCase().trim() || 'S/F',
                razonSocial: document.getElementById('s-razon').value.toUpperCase().trim() || 'NO ESPECIFICADA',
                fechaInicio: document.getElementById('s-fecha-ini').value,
                fechaFin: document.getElementById('s-fecha-fin').value,
                horaInicio: document.getElementById('s-hora-ini').value,
                horaFin: document.getElementById('s-hora-fin').value,
                estado: 'activo', 
                excepcionCierre: false, // Flag para saber si se reactivó manual
                timestamp: new Date()
            };

            try {
                await window.addDoc(window.collection(window.db, "directorio_servicios"), payload);
                document.getElementById('form-servicio').reset();
                window.cargarServicios();
            } catch (error) { alert("Error al guardar."); }

            btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up mr-2"></i> Activar y Guardar Servicio'; btn.disabled = false;
        };

        window.cargarServicios = async function() {
            const container = document.getElementById('lista-servicios-container');
            container.innerHTML = '<div class="text-center py-20 text-slate-400 italic"><i class="fa-solid fa-spinner fa-spin text-3xl mb-3 text-orange-300 block"></i></div>';
            
            try {
                const q = window.query(window.collection(window.db, "directorio_servicios"), window.orderBy("timestamp", "desc"));
                const qs = await window.getDocs(q);
                serviciosGlobales = [];
                const hoy = new Date();

                let promesasActualizacion = [];

                qs.forEach((docSnap) => {
                    let data = docSnap.data();
                    data.id = docSnap.id;
                    
                    // Lógica de Auto-Cierre Inteligente (Ventana de 2 días)
                    if (data.estado === 'activo' && !data.excepcionCierre) {
                        let fFin = new Date(data.fechaFin + 'T23:59:59');
                        let diasVencido = (hoy - fFin) / (1000 * 60 * 60 * 24);
                        
                        if (diasVencido > 2) {
                            data.estado = 'finalizado'; // Actualizamos localmente para la vista
                            // Agregamos a la cola para actualizar en Firebase
                            promesasActualizacion.push( window.updateDoc(window.doc(window.db, "directorio_servicios", data.id), { estado: 'finalizado' }) );
                        }
                    }
                    
                    serviciosGlobales.push(data);
                });

                // Si hubo auto-cierres, los ejecutamos en segundo plano
                if(promesasActualizacion.length > 0) Promise.all(promesasActualizacion).catch(e => console.log("Error auto-cierre", e));

                renderizarLista();
            } catch (error) { container.innerHTML = '<p class="text-center text-xs text-red-500 py-10 font-bold">Error de conexión.</p>'; }
        };

        function renderizarLista() {
            const container = document.getElementById('lista-servicios-container');
            let filtrados = serviciosGlobales.filter(s => s.estado === vistaActual);
            
            if(filtrados.length === 0) {
                container.innerHTML = `<p class="text-center text-xs text-slate-400 py-10">No hay servicios en estado ${vistaActual}.</p>`;
                return;
            }

            let html = '';
            filtrados.forEach(data => {
                let badgeStyle = data.estado === 'activo' ? 'bg-emerald-100 text-emerald-700 border-emerald-200' : (data.estado === 'pausa' ? 'bg-amber-100 text-amber-700 border-amber-200' : 'bg-slate-100 text-slate-500 border-slate-200');
                
                html += `
                <div class="bg-white border border-slate-200 rounded-2xl p-4 shadow-sm relative transition hover:shadow-md">
                    <div class="flex justify-between items-start mb-1">
                        <h4 class="font-black text-sm text-slate-800 w-3/4">${data.nombreComercial}</h4>
                        <div class="flex gap-2">
                            <button onclick="prepararEdicion('${data.id}')" class="text-slate-400 hover:text-orange-500 transition" title="Editar Servicio"><i class="fa-solid fa-pen"></i></button>
                            <button onclick="prepararReporte('${data.id}')" class="text-slate-400 hover:text-red-500 transition" title="Generar Reporte PDF"><i class="fa-solid fa-file-pdf"></i></button>
                        </div>
                    </div>
                    
                    <p class="text-[9px] text-slate-400 font-bold uppercase mb-2">Folio: ${data.folio} | Razón: ${data.razonSocial}</p>
                    
                    <div class="flex flex-wrap gap-2 text-[10px] font-bold text-slate-600 mb-3 bg-slate-50 p-2 rounded-lg border border-slate-100">
                        <span><i class="fa-solid fa-calendar-day text-orange-400 mr-1"></i> ${data.fechaInicio} al ${data.fechaFin}</span> <span>|</span>
                        <span><i class="fa-solid fa-clock text-sky-400 mr-1"></i> ${data.horaInicio} - ${data.horaFin}</span>
                    </div>

                    <div class="flex gap-2 items-center">
                        <span class="${badgeStyle} border px-2 py-1 rounded text-[9px] font-black uppercase"><i class="fa-solid fa-circle text-[8px] mr-1"></i> ${data.estado}</span>
                        <select onchange="cambiarEstado('${data.id}', this.value)" class="flex-1 p-1.5 bg-slate-50 border border-slate-200 rounded-lg text-[10px] font-bold outline-none text-slate-600 focus:border-orange-400">
                            <option value="activo" ${data.estado === 'activo' ? 'selected' : ''}>Marcar como ACTIVO</option>
                            <option value="pausa" ${data.estado === 'pausa' ? 'selected' : ''}>Poner en PAUSA</option>
                            <option value="finalizado" ${data.estado === 'finalizado' ? 'selected' : ''}>FINALIZAR</option>
                        </select>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        window.cambiarEstado = async function(id, nuevoEstado) {
            let data = serviciosGlobales.find(s => s.id === id);
            let payload = { estado: nuevoEstado, ultimaModificacion: new Date() };
            // Si el administrador lo reactiva manualmente, activamos la excepción para que no se auto-cierre
            if(nuevoEstado === 'activo') payload.excepcionCierre = true; 
            
            try {
                await window.updateDoc(window.doc(window.db, "directorio_servicios", id), payload);
                window.cargarServicios(); 
            } catch (error) { alert("No se pudo actualizar el estado."); }
        };

        // 3. EDICIÓN DE SERVICIOS
        window.prepararEdicion = function(id) {
            let data = serviciosGlobales.find(s => s.id === id);
            document.getElementById('e-id').value = id;
            document.getElementById('e-comercial').value = data.nombreComercial;
            document.getElementById('e-folio').value = data.folio;
            document.getElementById('e-razon').value = data.razonSocial;
            document.getElementById('e-fecha-fin').value = data.fechaFin;
            document.getElementById('e-hora-fin').value = data.horaFin;
            abrirModal('editar');
        };

        window.guardarEdicion = async function() {
            const id = document.getElementById('e-id').value;
            const btn = document.getElementById('btn-guardar-edicion');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-1"></i> Guardando...'; btn.disabled = true;
            
            try {
                await window.updateDoc(window.doc(window.db, "directorio_servicios", id), {
                    nombreComercial: document.getElementById('e-comercial').value.toUpperCase(),
                    folio: document.getElementById('e-folio').value.toUpperCase(),
                    razonSocial: document.getElementById('e-razon').value.toUpperCase(),
                    fechaFin: document.getElementById('e-fecha-fin').value,
                    horaFin: document.getElementById('e-hora-fin').value
                });
                cerrarModal('editar');
                window.cargarServicios();
            } catch(e) { alert("Error al guardar."); }
            btn.innerHTML = 'Guardar Cambios'; btn.disabled = false;
        };

        // 4. MOTOR DE REPORTES PDF
        window.prepararReporte = function(id) {
            servicioParaReporte = serviciosGlobales.find(s => s.id === id);
            abrirModal('reporte');
        };

        window.generarReportePDF = async function() {
            const btn = document.getElementById('btn-generar-pdf');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Consultando Registros...'; btn.disabled = true;

            const chkTotales = document.getElementById('chk-totales').checked;
            const chkDesglose = document.getElementById('chk-desglose').checked;
            const chkPersonal = document.getElementById('chk-personal').checked;
            const chkGraficas = document.getElementById('chk-graficas').checked;

            try {
                // 1. Consultar todos los registros de este servicio
                const q = window.query(window.collection(window.db, "registros"), window.where("idServicio", "==", servicioParaReporte.id));
                const qs = await window.getDocs(q);
                
                let registros = [];
                let diasLaboradosSet = new Set();
                let hrsPorMedico = {};
                let totalesEstudio = {};
                let personalEstudios = {}; // { MedicoA: { HC: 5, Espiro: 2 } }
                let diaEstudios = {}; // { '2026-07-15': { HC: 10 } }

                qs.forEach(doc => {
                    let d = doc.data();
                    diasLaboradosSet.add(d.fecha);
                    
                    if(!hrsPorMedico[d.fecha]) hrsPorMedico[d.fecha] = {};
                    // Para simplificar, asignamos las horas de la jornada a cada médico que participó en ese registro
                    
                    if(d.detalles) {
                        d.detalles.forEach(det => {
                            let med = det.medico;
                            let est = det.estudio;
                            let c = parseInt(det.cant) || 0;

                            // Totales Generales
                            totalesEstudio[est] = (totalesEstudio[est] || 0) + c;
                            
                            // Por Día
                            if(!diaEstudios[d.fecha]) diaEstudios[d.fecha] = {};
                            diaEstudios[d.fecha][est] = (diaEstudios[d.fecha][est] || 0) + c;

                            // Por Personal
                            if(!personalEstudios[med]) personalEstudios[med] = {};
                            personalEstudios[med][est] = (personalEstudios[med][est] || 0) + c;
                            
                            // Horas (asumimos la hora del registro general para el personal)
                            if(!hrsPorMedico[d.fecha][med]) hrsPorMedico[d.fecha][med] = parseFloat(d.horasLaboradas || 0);
                        });
                    }
                });

                // Calcular horas totales por médico sumando sus días
                let horasTotalMedico = {};
                for(let f in hrsPorMedico) {
                    for(let m in hrsPorMedico[f]) {
                        horasTotalMedico[m] = (horasTotalMedico[m] || 0) + hrsPorMedico[f][m];
                    }
                }

                // 2. CONSTRUCCIÓN DEL HTML PARA IMPRESIÓN
                const zona = document.getElementById('zona-impresion');
                let htmlPDF = `<div class="print-page">`;
                
                // --- ENCABEZADO FIJO ---
                htmlPDF += `
                <table class="header-reporte">
                    <tr>
                        <td class="h-logo"><img src="logoLAPI.png" style="max-height: 45px;"></td>
                        <td class="h-title"><h2 style="font-size: 16px; margin:0; text-transform:uppercase;">Reporte de Servicio Foráneo</h2><p style="margin:2px 0 0 0; color:#ea580c;">Folio: ${servicioParaReporte.folio}</p></td>
                    </tr>
                </table>
                <table class="info-grid">
                    <tr><th>Campaña / Servicio:</th><td colspan="3"><b>${servicioParaReporte.nombreComercial}</b></td></tr>
                    <tr><th>Razón Social:</th><td colspan="3">${servicioParaReporte.razonSocial}</td></tr>
                    <tr><th>Periodo Programado:</th><td>${servicioParaReporte.fechaInicio} al ${servicioParaReporte.fechaFin}</td><th>Horario Base:</th><td>${servicioParaReporte.horaInicio} - ${servicioParaReporte.horaFin}</td></tr>
                    <tr><th>Días con Actividad Real:</th><td colspan="3">${diasLaboradosSet.size} días (Fechas: ${Array.from(diasLaboradosSet).sort().join(', ') || 'Ninguna'})</td></tr>
                </table>`;

                if(diasLaboradosSet.size === 0) {
                    htmlPDF += `<p style="text-align:center; font-style:italic;">No hay registros operativos capturados para este servicio aún.</p></div>`;
                    zona.innerHTML = htmlPDF;
                    cerrarModal('reporte');
                    setTimeout(() => { window.print(); }, 500);
                    btn.innerHTML = '<i class="fa-solid fa-print"></i> Consultar y Generar PDF'; btn.disabled = false;
                    return;
                }

                // --- TABLA: TOTALES ---
                if(chkTotales) {
                    htmlPDF += `<div class="seccion-titulo">Resumen General de Estudios Realizados</div><table class="table-formal"><tr><th class="text-left">Tipo de Estudio</th><th style="width:20%;">Total</th></tr>`;
                    for(let e in totalesEstudio) htmlPDF += `<tr><td class="text-left">${e}</td><td><b>${totalesEstudio[e]}</b></td></tr>`;
                    htmlPDF += `</table>`;
                }

                // --- TABLA: DESGLOSE POR DÍA ---
                if(chkDesglose) {
                    htmlPDF += `<div class="seccion-titulo">Desglose Operativo por Día</div><table class="table-formal"><tr><th class="text-left">Fecha</th><th>Estudio</th><th style="width:20%;">Cantidad</th></tr>`;
                    let fechasSort = Object.keys(diaEstudios).sort();
                    fechasSort.forEach(f => {
                        let estudiosDia = diaEstudios[f];
                        let keys = Object.keys(estudiosDia);
                        htmlPDF += `<tr><td rowspan="${keys.length}" class="text-left" style="vertical-align:top;"><b>${f}</b></td><td class="text-left">${keys[0]}</td><td>${estudiosDia[keys[0]]}</td></tr>`;
                        for(let i=1; i<keys.length; i++) htmlPDF += `<tr><td class="text-left">${keys[i]}</td><td>${estudiosDia[keys[i]]}</td></tr>`;
                    });
                    htmlPDF += `</table>`;
                }

                // --- TABLA: PERSONAL ---
                if(chkPersonal) {
                    htmlPDF += `<div class="seccion-titulo">Productividad del Personal Designado</div><table class="table-formal"><tr><th class="text-left">Personal</th><th>Estudio Realizado</th><th style="width:15%;">Estudios Totales</th><th style="width:15%;">Horas Registradas</th></tr>`;
                    let medSort = Object.keys(personalEstudios).sort();
                    medSort.forEach(m => {
                        let estMed = personalEstudios[m];
                        let keys = Object.keys(estMed);
                        htmlPDF += `<tr><td rowspan="${keys.length}" class="text-left" style="vertical-align:top; color:#4338ca;"><b>${m}</b></td><td class="text-left">${keys[0]}</td><td>${estMed[keys[0]]}</td><td rowspan="${keys.length}" style="vertical-align:middle;">${horasTotalMedico[m] || 0} h</td></tr>`;
                        for(let i=1; i<keys.length; i++) htmlPDF += `<tr><td class="text-left">${keys[i]}</td><td>${estMed[keys[i]]}</td></tr>`;
                    });
                    htmlPDF += `</table>`;
                }

                htmlPDF += `</div>`; // Fin página 1 (Tablas)

                // --- ANEXO VISUAL (GRÁFICAS) ---
                if(chkGraficas) {
                    htmlPDF += `<div class="print-page"><div class="seccion-titulo" style="margin-top:20px;">Anexo Gráfico del Servicio</div>`;
                    htmlPDF += `<div class="grafica-container"><canvas id="chart-totales"></canvas></div>`;
                    htmlPDF += `<div class="grafica-container"><canvas id="chart-personal"></canvas></div></div>`;
                }

                zona.innerHTML = htmlPDF;
                
                // RENDERIZAR GRÁFICAS (Si aplica)
                if(chkGraficas) {
                    setTimeout(() => {
                        // Chart Totales
                        new Chart(document.getElementById('chart-totales').getContext('2d'), {
                            type: 'bar',
                            data: { labels: Object.keys(totalesEstudio), datasets: [{ label: 'Total Realizado', data: Object.values(totalesEstudio), backgroundColor: '#f97316' }] },
                            options: { plugins: { title: { display: true, text: 'Distribución de Estudios' } }, animation: false }
                        });
                        
                        // Chart Productividad (Total estudios por persona)
                        let labelsPers = Object.keys(personalEstudios);
                        let dataPers = labelsPers.map(m => Object.values(personalEstudios[m]).reduce((a,b)=>a+b, 0));
                        new Chart(document.getElementById('chart-personal').getContext('2d'), {
                            type: 'doughnut',
                            data: { labels: labelsPers, datasets: [{ data: dataPers, backgroundColor: ['#3b82f6','#10b981','#8b5cf6','#ef4444','#f59e0b'] }] },
                            options: { plugins: { title: { display: true, text: 'Productividad Global por Personal' } }, animation: false, maintainAspectRatio: false }
                        });
                    }, 100);
                }

                cerrarModal('reporte');
                
                // Dar tiempo al DOM y canvas para renderizar antes de imprimir
                setTimeout(() => { 
                    window.print(); 
                    zona.innerHTML = ''; // Limpiar tras imprimir
                }, 800);

            } catch (error) {
                console.error(error);
                alert("Error al extraer los datos para el reporte.");
            }
            
            btn.innerHTML = '<i class="fa-solid fa-print"></i> Consultar y Generar PDF'; btn.disabled = false;
        };
    </script>
</body>
</html>
