<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist Unidades - LAPI</title>
    
    <link rel="manifest" href="manifest_captura.json">
    <meta name="theme-color" content="#ea580c">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        .glass { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .scroll-custom::-webkit-scrollbar { width: 4px; }
        .scroll-custom::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 10px; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #canvas-firma { touch-action: none; background-color: rgba(255, 255, 255, 0.9); cursor: crosshair; }
        
        /* Estilos para el switch tipo pastilla (Bien/Mal) */
        .check-toggle:checked + div { background-color: #ef4444; color: white; border-color: #dc2626; }
        .check-toggle:not(:checked) + div { background-color: #22c55e; color: white; border-color: #16a34a; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        // 👇 IMPORTAMOS FIREBASE STORAGE PARA LAS FOTOS 👇
        import { getStorage, ref, uploadString, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDW-KIxM3m5QXnfzpOUmwhuLILLAk6u5rA",
            authDomain: "lapi-productividad.firebaseapp.com",
            projectId: "lapi-productividad",
            storageBucket: "lapi-productividad.firebasestorage.app",
            messagingSenderId: "1077149571149",
            appId: "1:1077149571149:web:e1423dde4a8de6f8562404"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.storage = getStorage(app);
        
        window.addDoc = addDoc; 
        window.collection = collection;
        window.serverTimestamp = serverTimestamp;
        window.ref = ref;
        window.uploadString = uploadString;
        window.getDownloadURL = getDownloadURL;
    </script>
</head>
<body class="bg-gradient-to-br from-orange-400 to-orange-600 min-h-screen text-white pb-20">

    <div id="toast-container" class="fixed top-4 right-4 z-[100] flex flex-col gap-2 pointer-events-none"></div>

    <!-- NAVEGACIÓN SUPERIOR -->
    <div class="glass text-white p-4 shadow-md sticky top-0 z-50 rounded-b-3xl mx-2 mb-6 flex justify-between items-center">
        <div>
            <h1 class="text-lg font-black tracking-tight leading-tight"><i class="fa-solid fa-truck-fast mr-1"></i> Unidades Móviles</h1>
            <p class="text-[10px] font-bold opacity-80 uppercase tracking-widest">Inspección Física</p>
        </div>
        <button onclick="window.location.href='portal.html'" class="bg-white/20 hover:bg-white/30 p-2 rounded-xl text-xs font-bold transition-all"><i class="fa-solid fa-house mr-1"></i> Portal</button>
    </div>

    <div class="max-w-md mx-auto px-4 w-full">

        <!-- PASO 1: DATOS GENERALES -->
        <div id="paso-1" class="animate-fade-in glass p-6 rounded-3xl shadow-xl">
            <h2 class="font-black text-xl mb-6 border-b border-white/20 pb-4 text-center"><i class="fa-solid fa-clipboard-list mr-2"></i> Datos de Inspección</h2>
            
            <div class="space-y-4 text-left">
                <!-- TIPO DE REVISIÓN -->
                <div class="bg-black/10 p-3 rounded-xl border border-white/10 mb-2">
                    <label class="block text-[10px] font-bold text-white/90 uppercase tracking-widest mb-2 text-center text-orange-200">Momento de la Revisión</label>
                    <div class="grid grid-cols-2 gap-2">
                        <label class="cursor-pointer">
                            <input type="radio" name="tipoRevision" value="Llegada" class="peer sr-only" checked>
                            <div class="peer-checked:bg-white peer-checked:text-orange-600 bg-white/20 text-white font-bold text-center py-2 rounded-lg border border-white/10 transition-all text-sm shadow-sm"><i class="fa-solid fa-right-to-bracket mr-1"></i> Recepción</div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="tipoRevision" value="Salida" class="peer sr-only">
                            <div class="peer-checked:bg-white peer-checked:text-orange-600 bg-white/20 text-white font-bold text-center py-2 rounded-lg border border-white/10 transition-all text-sm shadow-sm"><i class="fa-solid fa-right-from-bracket mr-1"></i> Entrega</div>
                        </label>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[10px] font-bold text-white/90 uppercase tracking-widest mb-1">Unidad</label>
                        <div class="relative">
                            <select id="chk-unidad" class="w-full p-3 bg-white/20 text-white border-none rounded-xl outline-none focus:ring-2 focus:ring-white/50 transition font-bold text-sm appearance-none cursor-pointer">
                                <option value="" disabled selected class="text-white/60">Elegir...</option>
                                <option value="UM-01" class="text-slate-800">UM-01</option>
                                <option value="UM-02" class="text-slate-800">UM-02</option>
                                <option value="UM-03" class="text-slate-800">UM-03</option>
                            </select>
                            <i class="fa-solid fa-chevron-down absolute right-3 top-4 pointer-events-none text-white/70"></i>
                        </div>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-white/90 uppercase tracking-widest mb-1">Fecha</label>
                        <input type="date" id="chk-fecha" class="w-full p-3 bg-white/20 text-white border-none rounded-xl outline-none focus:ring-2 focus:ring-white/50 transition font-bold text-sm">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-white/90 uppercase tracking-widest mb-1">Lugar / Empresa Destino</label>
                    <input type="text" id="chk-empresa" list="lista-empresas" placeholder="Buscar empresa..." class="w-full p-3 bg-white/20 text-white placeholder-white/60 border-none rounded-xl outline-none focus:ring-2 focus:ring-white/50 transition font-bold uppercase text-sm">
                </div>

                <button onclick="irPaso2()" class="w-full bg-white hover:bg-orange-50 text-orange-600 font-black py-4 rounded-xl shadow-lg transition-all active:scale-95 mt-4 text-sm flex justify-center items-center gap-2">
                    Iniciar Checklist <i class="fa-solid fa-arrow-right"></i>
                </button>
            </div>
        </div>

        <!-- PASO 2: CHECKLIST FÍSICO -->
        <div id="paso-2" class="hidden animate-fade-in glass p-6 rounded-3xl shadow-xl space-y-6">
            <h2 class="font-black text-xl border-b border-white/20 pb-4 text-center"><i class="fa-solid fa-list-check mr-2"></i> Estado Físico</h2>
            
            <p class="text-xs text-center opacity-80 mb-2 italic">Toca el botón si el elemento presenta daños.</p>

            <div id="contenedor-items" class="space-y-6">
                <!-- Se inyectan las categorías desde JS -->
            </div>

            <div class="flex gap-2 pt-4">
                <button onclick="volverPaso1()" class="w-1/3 bg-white/20 hover:bg-white/30 text-white font-bold py-3.5 rounded-xl shadow-lg transition-all active:scale-95 flex justify-center items-center gap-2">
                    Atrás
                </button>
                <button onclick="irPaso3()" class="w-2/3 bg-white text-orange-600 font-black py-3.5 rounded-xl shadow-lg transition-all active:scale-95 flex justify-center items-center gap-2">
                    Continuar <i class="fa-solid fa-arrow-right"></i>
                </button>
            </div>
        </div>

        <!-- PASO 3: EVIDENCIAS Y FIRMA -->
        <div id="paso-3" class="hidden animate-fade-in glass p-6 rounded-3xl shadow-xl">
            <h2 class="font-black text-xl mb-4 border-b border-white/20 pb-4 text-center"><i class="fa-solid fa-camera mr-2"></i> Evidencia y Cierre</h2>
            
            <div id="alerta-fotos" class="bg-red-500/20 border border-red-400 p-4 rounded-xl mb-6 hidden">
                <p class="text-xs font-bold text-red-100 text-center"><i class="fa-solid fa-triangle-exclamation mr-1 text-red-300"></i> Reportaste elementos dañados. Por favor, adjunta al menos una foto de evidencia para respaldar tu revisión.</p>
            </div>

            <!-- GALERÍA DE FOTOS -->
            <div class="bg-black/10 p-4 rounded-xl border border-white/10 mb-6">
                <div class="flex justify-between items-center mb-3">
                    <label class="block text-[10px] font-bold text-white/90 uppercase tracking-widest">Fotos (Opcional si todo está Bien)</label>
                    
                    <label class="bg-orange-500 hover:bg-orange-400 text-white px-3 py-1.5 rounded-lg text-[10px] font-bold cursor-pointer active:scale-95 transition shadow-md">
                        <i class="fa-solid fa-camera mr-1"></i> Tomar Foto
                        <input type="file" accept="image/*" capture="environment" id="input-foto" class="hidden" onchange="procesarFoto(event)">
                    </label>
                </div>
                
                <div id="galeria-fotos" class="grid grid-cols-2 gap-2 empty:hidden"></div>
                <p id="txt-sin-fotos" class="text-xs text-white/50 text-center italic py-2">Sin fotos agregadas.</p>
            </div>

            <div class="mb-6">
                <label class="block text-[10px] font-bold text-white/90 uppercase tracking-widest mb-1">Observaciones Generales</label>
                <textarea id="chk-obs" class="w-full p-3 rounded-xl bg-white/20 border-none outline-none placeholder-white/60 text-sm font-medium" rows="2" placeholder="Ej. Se entrega con basura en la entrada..."></textarea>
            </div>

            <div class="border-t border-white/20 pt-4">
                <label class="block text-[10px] font-bold text-white/90 uppercase tracking-widest mb-1">Responsable (Firma)</label>
                <input type="text" id="chk-medico" list="lista-medicos" placeholder="Seleccione su nombre..." class="w-full p-3 bg-white/20 text-white placeholder-white/60 border-none rounded-xl outline-none focus:ring-2 focus:ring-white/50 transition font-bold uppercase text-sm mb-4">
                
                <div class="flex justify-between items-end mb-1">
                    <label class="block text-[10px] font-bold text-white/90 uppercase tracking-widest">Firma Digital</label>
                    <button onclick="limpiarFirma()" class="text-[10px] text-orange-200 hover:text-white font-bold underline"><i class="fa-solid fa-eraser"></i> Limpiar</button>
                </div>
                <div class="bg-white p-1 rounded-xl shadow-inner border border-white/30 overflow-hidden relative touch-none">
                    <canvas id="canvas-firma" height="150" class="w-full rounded-lg touch-none"></canvas>
                </div>
            </div>

            <div class="flex gap-2 pt-6">
                <button onclick="volverPaso2()" class="w-1/3 bg-white/20 hover:bg-white/30 text-white font-bold py-3.5 rounded-xl shadow-lg transition-all active:scale-95 flex justify-center items-center gap-2">
                    Atrás
                </button>
                <button id="btn-enviar" onclick="guardarChecklist()" class="w-2/3 bg-emerald-500 hover:bg-emerald-400 text-white font-black py-3.5 rounded-xl shadow-lg transition-all active:scale-95 flex justify-center items-center gap-2">
                    <i class="fa-solid fa-cloud-arrow-up"></i> Guardar
                </button>
            </div>
        </div>

    </div>

    <datalist id="lista-empresas"></datalist>
    <datalist id="lista-medicos"></datalist>

    <script>
        // CONFIGURACIÓN DEL CHECKLIST
        const categoriasChecklist = {
            "Exterior": ["Llantas / Presión", "Pintura y Rotulación", "Escalones y Barandal", "Conexiones Externas"],
            "Interior": ["Piso y Limpieza", "Iluminación Interior", "Aire Acondicionado"],
            "Cabinas": ["Espuma Acústica", "Puerta y Bisagras", "Conexiones Internas"]
        };

        let fotosBase64 = []; // Guarda las fotos procesadas
        
        // FIRMA DIGITAL VARIABLES
        const canvas = document.getElementById('canvas-firma');
        const ctx = canvas.getContext('2d');
        let dibujando = false;

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById('chk-fecha').value = new Date().toISOString().split('T')[0];
            
            if(window.LAPI_CONFIG && window.LAPI_CONFIG.empresas) {
                document.getElementById('lista-empresas').innerHTML = window.LAPI_CONFIG.empresas.map(e => `<option value="${e}">`).join('');
            }
            if(window.LAPI_CONFIG && window.LAPI_CONFIG.medicos) {
                document.getElementById('lista-medicos').innerHTML = window.LAPI_CONFIG.medicos.map(m => `<option value="${m}">`).join('');
            }

            generarDomChecklist();
            configurarCanvas();
        });

        function mostrarToast(mensaje, tipo = 'error') {
            const toast = document.createElement('div');
            const color = tipo === 'exito' ? 'bg-emerald-500' : 'bg-red-500';
            const icono = tipo === 'exito' ? 'fa-check-circle' : 'fa-triangle-exclamation';
            toast.className = `${color} text-white px-4 py-3 rounded-xl shadow-2xl font-bold text-sm flex items-center gap-3 transform transition-all duration-300 translate-x-full opacity-0 z-[300] max-w-xs`;
            toast.innerHTML = `<i class="fa-solid ${icono} text-lg"></i> <span class="leading-tight">${mensaje}</span>`;
            document.getElementById('toast-container').appendChild(toast);
            setTimeout(() => toast.classList.remove('translate-x-full', 'opacity-0'), 10);
            setTimeout(() => { toast.classList.add('translate-x-full', 'opacity-0'); setTimeout(() => toast.remove(), 300); }, 3500);
        }

        function generarDomChecklist() {
            const cont = document.getElementById('contenedor-items');
            cont.innerHTML = "";
            let html = "";

            for (const [cat, items] of Object.entries(categoriasChecklist)) {
                html += `<div class="bg-black/10 p-4 rounded-2xl border border-white/10">
                            <h3 class="font-black text-orange-200 text-xs uppercase tracking-widest mb-3">${cat}</h3>
                            <div class="space-y-2">`;
                
                items.forEach((item, index) => {
                    const idSaneado = `chk_${cat.substring(0,3)}_${index}`;
                    html += `
                        <div class="flex justify-between items-center bg-white/10 p-2 pl-3 rounded-xl border border-white/5">
                            <span class="text-sm font-bold text-white/90 leading-tight w-2/3">${item}</span>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <!-- Ojo: Checkeado = MAL, Descheckeado = BIEN -->
                                <input type="checkbox" id="${idSaneado}" data-nombre="${item}" class="check-toggle sr-only peer">
                                <div class="w-16 h-8 flex items-center justify-center rounded-lg border-2 text-[10px] font-black tracking-widest uppercase transition-all duration-300 select-none">
                                    BIEN
                                </div>
                            </label>
                        </div>
                    `;
                });
                html += `</div></div>`;
            }
            cont.innerHTML = html;

            // Script para cambiar el texto del switch
            document.querySelectorAll('.check-toggle').forEach(el => {
                el.addEventListener('change', (e) => {
                    const div = e.target.nextElementSibling;
                    if(e.target.checked) { div.innerText = "MAL"; } 
                    else { div.innerText = "BIEN"; }
                });
            });
        }

        // CONTROL DE FLUJO
        window.irPaso2 = function() {
            const unidad = document.getElementById('chk-unidad').value;
            const empresa = document.getElementById('chk-empresa').value;
            if(!unidad || !empresa) return mostrarToast("Selecciona la Unidad y la Empresa Destino.");
            
            document.getElementById('paso-1').classList.add('hidden');
            document.getElementById('paso-2').classList.remove('hidden');
        };

        window.volverPaso1 = function() {
            document.getElementById('paso-2').classList.add('hidden');
            document.getElementById('paso-1').classList.remove('hidden');
        };

        window.irPaso3 = function() {
            // Verificar si hay daños para mostrar alerta de foto
            let hayDanos = false;
            document.querySelectorAll('.check-toggle').forEach(el => { if(el.checked) hayDanos = true; });
            
            if(hayDanos) document.getElementById('alerta-fotos').classList.remove('hidden');
            else document.getElementById('alerta-fotos').classList.add('hidden');

            document.getElementById('paso-2').classList.add('hidden');
            document.getElementById('paso-3').classList.remove('hidden');
            ajustarCanvas();
        };

        window.volverPaso2 = function() {
            document.getElementById('paso-3').classList.add('hidden');
            document.getElementById('paso-2').classList.remove('hidden');
        };

        // MANEJO DE FOTOGRAFÍAS (COMPRESIÓN A BASE64)
        window.procesarFoto = function(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    // Redimensionar para no saturar Firebase Storage
                    const canvasImg = document.createElement('canvas');
                    const MAX_WIDTH = 800; const MAX_HEIGHT = 800;
                    let width = img.width; let height = img.height;

                    if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } } 
                    else { if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; } }

                    canvasImg.width = width; canvasImg.height = height;
                    const ctxImg = canvasImg.getContext('2d');
                    ctxImg.drawImage(img, 0, 0, width, height);

                    // Comprimir a JPEG calidad media
                    const dataUrl = canvasImg.toDataURL('image/jpeg', 0.6);
                    fotosBase64.push(dataUrl);
                    renderizarGaleria();
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
            event.target.value = ''; // Reset input
        };

        function renderizarGaleria() {
            const galeria = document.getElementById('galeria-fotos');
            const txt = document.getElementById('txt-sin-fotos');
            galeria.innerHTML = "";
            
            if(fotosBase64.length > 0) txt.classList.add('hidden');
            else txt.classList.remove('hidden');

            fotosBase64.forEach((foto, index) => {
                galeria.innerHTML += `
                    <div class="relative rounded-lg overflow-hidden border border-white/20 aspect-square">
                        <img src="${foto}" class="object-cover w-full h-full">
                        <button onclick="eliminarFoto(${index})" class="absolute top-1 right-1 bg-red-500 w-6 h-6 rounded-full text-white text-[10px] flex items-center justify-center shadow-lg"><i class="fa-solid fa-xmark"></i></button>
                    </div>
                `;
            });
        }

        window.eliminarFoto = function(index) {
            fotosBase64.splice(index, 1);
            renderizarGaleria();
        };

        // GUARDAR CHECKLIST MAESTRO
        window.guardarChecklist = async function() {
            const btn = document.getElementById('btn-enviar');
            
            const responsable = document.getElementById('chk-medico').value.trim().toUpperCase();
            if(!responsable) return mostrarToast("Ingresa tu nombre o el del responsable.");
            
            const blank = document.createElement('canvas');
            blank.width = canvas.width; blank.height = canvas.height;
            if(canvas.toDataURL() === blank.toDataURL()) return mostrarToast("La firma es obligatoria.");

            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Subiendo...'; btn.disabled = true;

            try {
                // 1. Recolectar datos generales
                let dataDoc = {
                    unidad: document.getElementById('chk-unidad').value,
                    empresa: document.getElementById('chk-empresa').value.trim().toUpperCase(),
                    tipo_revision: document.querySelector('input[name="tipoRevision"]:checked').value,
                    fecha: document.getElementById('chk-fecha').value,
                    responsable: responsable,
                    observaciones: document.getElementById('chk-obs').value,
                    firma: canvas.toDataURL('image/png', 0.5),
                    evaluacion: {},
                    fotos_urls: [],
                    timestamp: window.serverTimestamp()
                };

                // 2. Recolectar Checklist
                document.querySelectorAll('.check-toggle').forEach(el => {
                    const nombreItem = el.getAttribute('data-nombre');
                    dataDoc.evaluacion[nombreItem] = el.checked ? "Mal" : "Bien";
                });

                // 3. Subir Fotos a Firebase Storage (Si hay)
                if(fotosBase64.length > 0) {
                    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Subiendo fotos...';
                    for(let i=0; i<fotosBase64.length; i++) {
                        const nombreArchivo = `unidades/${dataDoc.unidad}_${Date.now()}_${i}.jpg`;
                        const imgRef = window.ref(window.storage, nombreArchivo);
                        await window.uploadString(imgRef, fotosBase64[i], 'data_url');
                        const url = await window.getDownloadURL(imgRef);
                        dataDoc.fotos_urls.push(url);
                    }
                }

                // 4. Guardar Documento en Firestore
                btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Guardando Doc...';
                await window.addDoc(window.collection(window.db, "unidades_moviles"), dataDoc);
                
                mostrarToast("Checklist Guardado Exitosamente", "exito");
                setTimeout(() => { location.reload(); }, 2000);

            } catch (e) {
                console.error("Error completo:", e);
                mostrarToast("Error de conexión al guardar.");
                btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> Guardar'; btn.disabled = false;
            }
        };

        // ==========================================
        // LÓGICA DE FIRMA DIGITAL EN CANVAS
        // ==========================================
        function configurarCanvas() {
            ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.strokeStyle = '#0f172a';

            canvas.addEventListener('mousedown', iniciarDibujo);
            canvas.addEventListener('mousemove', dibujar);
            canvas.addEventListener('mouseup', detenerDibujo);
            canvas.addEventListener('mouseout', detenerDibujo);

            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault(); const touch = e.touches[0];
                const mouseEvent = new MouseEvent("mousedown", { clientX: touch.clientX, clientY: touch.clientY });
                canvas.dispatchEvent(mouseEvent);
            }, { passive: false });
            
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault(); const touch = e.touches[0];
                const mouseEvent = new MouseEvent("mousemove", { clientX: touch.clientX, clientY: touch.clientY });
                canvas.dispatchEvent(mouseEvent);
            }, { passive: false });

            canvas.addEventListener('touchend', () => canvas.dispatchEvent(new MouseEvent("mouseup")));
            window.addEventListener('resize', ajustarCanvas);
        }

        function ajustarCanvas() {
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height || 150;
            ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.strokeStyle = '#0f172a';
        }

        function obtenerPosicion(e) {
            const rect = canvas.getBoundingClientRect();
            return { x: e.clientX - rect.left, y: e.clientY - rect.top };
        }

        function iniciarDibujo(e) { dibujando = true; ctx.beginPath(); const pos = obtenerPosicion(e); ctx.moveTo(pos.x, pos.y); }
        function dibujar(e) { if (!dibujando) return; const pos = obtenerPosicion(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); }
        function detenerDibujo() { dibujando = false; ctx.closePath(); }
        window.limpiarFirma = () => { ctx.clearRect(0, 0, canvas.width, canvas.height); }

    </script>
</body>
</html>
