                inst: { 'MESA': 1, 'SILLAS': 2, 'SABANA (CAMPO PELLON AZUL DE 2X1 MTS) (1/10)': 6, 'GEL ANTIBACTERIAL GALON': 1, 'SUCURSALES DESINFECTANTE EN AEROSOL LYSOL': 1, 'SUCURSALES TABLA DE APOYO CARTA': 1, 'SUCURSALES TOALLA HUMEDA DESINFECTANTE': 1, 'SUCURSALES TOALLA INTERDOBLADA': 1, 'SUCURSALES CINTA MASKIN TAPE': 1, 'BOTE DE BASURA NEGRO': 1, 'BIOMBOS': 2, 'CAMA DE EXPLORACION CON PIERNERAS': 1 },
                inst_diario: { 'CUBREBOCAS MODE KN-95': 1 },
                est: { 'ABATELENGUAS (1/100) NO ESTÉRILES': 1 }
            },
            espiro: {
                inst: { 'MESA': 2, 'SILLAS': 2, 'SABANA (CAMPO PELLON AZUL DE 2X1 MTS) (1/10)': 6, 'GEL ANTIBACTERIAL GALON': 1, 'SUCURSALES DESINFECTANTE EN AEROSOL LYSOL': 1, 'SUCURSALES TABLA DE APOYO CARTA': 1, 'SUCURSALES TOALLA HUMEDA DESINFECTANTE': 1, 'SUCURSALES TOALLA INTERDOBLADA': 1, 'SUCURSALES CINTA MASKIN TAPE': 1, 'BOTE DE BASURA NEGRO': 1, 'BIOMBOS': 2, 'GUANTE VINIL MEDIANO (1/100)': 1 },
                inst_diario: { 'CUBREBOCAS MODE KN-95': 1 },
                est: { 'ABATELENGUAS (1/100) NO ESTÉRILES': 1 }
            },
            audio: {
                inst: { 'MESA': 2, 'SILLAS': 2, 'SABANA (CAMPO PELLON AZUL DE 2X1 MTS) (1/10)': 6, 'GEL ANTIBACTERIAL GALON': 1, 'SUCURSALES DESINFECTANTE EN AEROSOL LYSOL': 1, 'SUCURSALES TABLA DE APOYO CARTA': 1, 'SUCURSALES TOALLA HUMEDA DESINFECTANTE': 1, 'SUCURSALES TOALLA INTERDOBLADA': 1, 'SUCURSALES CINTA MASKIN TAPE': 1, 'BOTE DE BASURA NEGRO': 1, 'BOLSA LAPI': 2, 'EXTENSION': 1 },
                inst_diario: {},
                est: { 'ABATELENGUAS (1/100) NO ESTÉRILES': 1 }
            },
            visual: {
                inst: { 'MESA': 1, 'SILLAS': 2, 'GEL ANTIBACTERIAL GALON': 1, 'SUCURSALES DESINFECTANTE EN AEROSOL LYSOL': 1, 'BOTE DE BASURA NEGRO': 1 },
                inst_diario: {},
                est: {}
            }
        };

        let resultadosActuales = {};

        function calcularDias(ini, fin) {
            if(!ini || !fin) return 1;
            const d1 = new Date(ini); const d2 = new Date(fin);
            const diffDays = Math.ceil(Math.abs(d2 - d1) / (1000 * 60 * 60 * 24)); 
            return diffDays + 1;
        }

        window.calcularRequisicion = function() {
            resultadosActuales = {};
            const ini = document.getElementById('req-fecha-ini').value;
            const fin = document.getElementById('req-fecha-fin').value;
            const dias = calcularDias(ini, fin);

            const inputs = {
                hc_papel: { inst: parseInt(document.getElementById('hc_papel_inst').value)||0, est: parseInt(document.getElementById('hc_papel_est').value)||0 },
                hc_web:   { inst: parseInt(document.getElementById('hc_web_inst').value)||0, est: parseInt(document.getElementById('hc_web_est').value)||0 },
                espiro:   { inst: parseInt(document.getElementById('espiro_inst').value)||0, est: parseInt(document.getElementById('espiro_est').value)||0 },
                audio:    { inst: parseInt(document.getElementById('audio_inst').value)||0, est: parseInt(document.getElementById('audio_est').value)||0 },
                visual:   { inst: parseInt(document.getElementById('visual_inst').value)||0, est: parseInt(document.getElementById('visual_est').value)||0 }
            };

            for(const [tipo, vals] of Object.entries(inputs)) {
                if(vals.inst > 0) {
                    for(const [item, cant] of Object.entries(REGLAS[tipo].inst)) {
                        resultadosActuales[item] = (resultadosActuales[item] || 0) + (cant * vals.inst);
                    }
                    for(const [item, cant] of Object.entries(REGLAS[tipo].inst_diario)) {
                        resultadosActuales[item] = (resultadosActuales[item] || 0) + (cant * vals.inst * dias);
                    }
                }
                if(vals.est > 0) {
                    for(const [item, cant] of Object.entries(REGLAS[tipo].est)) {
                        resultadosActuales[item] = (resultadosActuales[item] || 0) + (cant * vals.est);
                    }
                }
            }

            renderizarPreviewEditable();
            document.getElementById('panel-preview').classList.remove('hidden');
        };

        function renderizarPreviewEditable() {
            let html = '<div class="space-y-1 pb-4">';
            
            // Renderizamos la lista completa del formato
            LAPI_FO_TF_49.forEach((item, index) => {
                const cant = resultadosActuales[item.desc] || '';
                const hasVal = cant > 0 ? 'bg-orange-100 border-orange-400 shadow-sm' : 'bg-white border-slate-200 opacity-60 hover:opacity-100';
                
                // Divisor visual para saber donde acaba la pag 1
                if (index === 55) {
                    html += `<div class="w-full border-t-2 border-dashed border-red-300 my-4 text-center text-[10px] text-red-500 font-bold">--- CORTE DE PÁGINA 1 ---</div>`;
                }

                html += `
                    <div class="flex justify-between items-center text-xs p-1.5 rounded transition-all ${hasVal}">
                        <div class="w-2/3 truncate" title="${item.desc}"><span class="text-slate-400 font-mono text-[9px] mr-2">${item.id}</span> <span class="text-slate-700 font-bold">${item.desc}</span></div>
                        <div class="w-1/3 text-right">
                            <input type="number" id="edit_${index}" value="${cant}" class="w-16 p-1 text-center font-black text-slate-800 rounded outline-none border focus:border-orange-500 transition-colors" placeholder="0">
                        </div>
                    </div>
                `;
            });

            // Agregados a mano (No existen en el catálogo original, se apendizan al final del PDF)
            html += `<div class="w-full border-t-2 border-slate-300 my-6"></div>`;
            html += `<h4 class="font-black text-[10px] text-slate-500 uppercase tracking-widest mb-2">Sección Manual (Impresos al final del Formato)</h4>`;
            
            const vBol = resultadosActuales['Bolsa blanca'] || '';
            const vEpp = resultadosActuales['Equipo de protección personal'] || '';
            
            html += `
                <div class="flex justify-between items-center text-xs p-1.5 rounded bg-white border border-slate-300 mb-1 shadow-sm">
                    <span class="text-slate-700 font-bold ml-1">Bolsa Blanca</span>
                    <input type="number" id="manual_bolsa" value="${vBol}" class="w-16 p-1 text-center font-black text-slate-800 rounded outline-none border focus:border-orange-500">
                </div>
                <div class="flex justify-between items-center text-xs p-1.5 rounded bg-white border border-slate-300 shadow-sm">
                    <span class="text-slate-700 font-bold ml-1">Equipo de protección personal</span>
                    <input type="number" id="manual_epp" value="${vEpp}" class="w-16 p-1 text-center font-black text-slate-800 rounded outline-none border focus:border-orange-500">
                </div>
            `;
            html += '</div>';

            document.getElementById('tabla-editable-container').innerHTML = html;
        }

            // Recoger valores modificados
            LAPI_FO_TF_49.forEach((item, index) => {
                let val = parseInt(document.getElementById(`edit_${index}`).value);

            });
            
            const valBolsa = parseInt(document.getElementById('manual_bolsa').value) || '';
            const valEpp = parseInt(document.getElementById('manual_epp').value) || '';

            // Datos Cabecera
            const empresa = document.getElementById('req-empresa').value || '_______________________';
            const medicosText = document.getElementById('req-medicos').value || '_______________________';
            const folioText = document.getElementById('req-folio').value || '_______________________';
            
            let numPacientesTotales = 0;
            ['hc_papel_est', 'hc_web_est', 'audio_est', 'espiro_est', 'visual_est'].forEach(id => {
                numPacientesTotales += (parseInt(document.getElementById(id).value) || 0);

            let htmlPDF = `<div class="print-page">

                </table>

                        <th style="width: 15%; text-align:center;">Cantidad solicitada</th>
                        <th style="width: 15%;">Observaciones</th>
                    </tr>`;

            // Imprimir primeros 55 items
            for(let i=0; i<55; i++) {
                let it = LAPI_FO_TF_49[i];
                let val = resultadosActuales[it.desc] > 0 ? resultadosActuales[it.desc] : '';
                htmlPDF += `<tr><td>${it.id}</td><td>${it.desc}</td><td style="text-align:center;">${it.ud}</td><td class="val-cell">${val}</td><td></td></tr>`;
            }

            htmlPDF += `</table><div class="page-footer">Página 1</div></div>`;

            // ================= PÁGINA 2 =================
            htmlPDF += `<div class="print-page">
                <div class="head-logo-container">
                    <div style="width: 25%;"><img src="logoLAPI.png" style="width: 90px;"></div>
                    <div class="lapi-title">Lapi<br><span style="font-size:12px; font-weight:normal;">Laboratorio Medico</span><br><br><span style="font-size:14px; text-decoration:underline;">MATERIAL DE SALIDA DE EMPRESAS</span></div>
                    <div style="width: 25%;">
                        <table class="meta-table" style="float: right;">
                            <tr><td>Código</td><td>FO-TF-49</td></tr>
                            <tr><td>Versión</td><td>3</td></tr>
                            <tr><td>Fecha de autorización:</td><td>25-feb-24</td></tr>
                            <tr><td>Páginas</td><td>2 de 2</td></tr>
                        </table>
                    </div>
                </div>

                <table class="table-req" style="margin-top: 10px;">
                    <tr>
                        <th style="width: 15%;">Número de articulo</th>
                        <th style="width: 45%;">Descripción articulo</th>
                        <th style="width: 10%; text-align:center;">Ud. de medida</th>
                        <th style="width: 15%; text-align:center;">Cantidad solicitada</th>
                        <th style="width: 15%;">Observaciones</th>
                    </tr>`;

            // Imprimir el resto (del 55 al 87)
            for(let i=55; i<LAPI_FO_TF_49.length; i++) {
                let it = LAPI_FO_TF_49[i];
                let val = resultadosActuales[it.desc] > 0 ? resultadosActuales[it.desc] : '';
                htmlPDF += `<tr><td>${it.id || ''}</td><td>${it.desc}</td><td style="text-align:center;">${it.ud || ''}</td><td class="val-cell">${val}</td><td></td></tr>`;
            }

            // Agregados a mano
            htmlPDF += `<tr><td></td><td>BOLSA BLANCA</td><td style="text-align:center;">PIEZA</td><td class="val-cell">${valBolsa}</td><td></td></tr>`;
            htmlPDF += `<tr><td></td><td>EQUIPO DE PROTECCIÓN PERSONAL</td><td style="text-align:center;">PIEZA</td><td class="val-cell">${valEpp}</td><td></td></tr>`;

            htmlPDF += `</table>`;

            // Firmas al final de la pag 2
            htmlPDF += `
                <div class="firmas-section">
                    <div class="firma-box">
                        <p style="margin-bottom: 25px;">Entrego:</p>

                    </div>
                    <div class="firma-box">
                        <p style="margin-bottom: 25px;">Reviso:</p>
                        <p>Nombre completo y firma</p>

                </div>
                <div class="page-footer" style="text-align:left; margin-top:20px;">Folio: __________________ <span style="float:right;">Página 2</span></div>
            </div>`;

            zona.innerHTML = htmlPDF;
            
            zona.classList.remove('hidden');
            setTimeout(() => { window.print(); zona.classList.add('hidden'); }, 500);

    </script>
