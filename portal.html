<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L Suite - Portal Operativo</title>
    
    <link rel="manifest" href="manifest_captura.json">
    <meta name="theme-color" content="#ea580c">
    <link rel="apple-touch-icon" href="icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* Efecto Cristal Estándar */
        .glass { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .app-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .app-card:hover { transform: translateY(-5px); background: rgba(255, 255, 255, 0.3); border-color: rgba(255, 255, 255, 0.5); }
        .app-card:active { transform: scale(0.95); }
        
        /* Fondo Animado */
        .bg-animated { background: linear-gradient(-45deg, #f97316, #ea580c, #f59e0b, #ec4899); background-size: 400% 400%; animation: gradientBG 15s ease infinite; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        /* Animaciones */
        .animate-fade-in-up { animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(20px); }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
    </style>
</head>
<body class="bg-animated min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden">

    <div class="absolute inset-0 opacity-10 pointer-events-none" style="background-image: radial-gradient(#ffffff 1px, transparent 1px); background-size: 30px 30px;"></div>
    <div class="absolute top-0 left-0 w-full h-32 bg-gradient-to-b from-white/20 to-transparent pointer-events-none"></div>

    <div class="text-center mb-10 w-full max-w-sm animate-fade-in-up relative z-10">
        <div class="w-24 h-24 bg-white rounded-[2rem] flex items-center justify-center mx-auto mb-6 shadow-2xl transform rotate-3 hover:rotate-0 transition-transform duration-300">
            <i class="fa-solid fa-staff-snake text-5xl text-orange-500"></i>
        </div>
        <h1 class="text-4xl font-black tracking-tight text-white mb-2 drop-shadow-md">L <span class="text-orange-200">Suite</span></h1>
        <p class="text-sm font-medium text-white/80 tracking-widest uppercase drop-shadow">Portal Operativo</p>
    </div>

    <div class="grid grid-cols-2 gap-4 w-full max-w-md mx-auto relative z-10">
        
        <a href="index.html" class="app-card glass rounded-3xl p-6 flex flex-col items-center justify-center text-center gap-3 animate-fade-in-up delay-100 shadow-xl">
            <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-red-400 to-red-600 flex items-center justify-center shadow-inner relative">
                <i class="fa-solid fa-suitcase-medical text-2xl text-white"></i>
            </div>
            <div>
                <h3 class="font-black text-sm text-white">FORÁNEOS</h3>
                <p class="text-[9px] text-white/80 font-bold uppercase tracking-widest mt-1">Servicios Int.</p>
            </div>
        </a>

        <a href="sucursa.html" class="app-card glass rounded-3xl p-6 flex flex-col items-center justify-center text-center gap-3 animate-fade-in-up delay-100 shadow-xl">
            <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-sky-400 to-sky-600 flex items-center justify-center shadow-inner relative">
                <i class="fa-regular fa-hospital text-2xl text-white"></i>
            </div>
            <div>
                <h3 class="font-black text-sm text-white">SUCURSALES</h3>
                <p class="text-[9px] text-white/80 font-bold uppercase tracking-widest mt-1">Productividad</p>
            </div>
        </a>

        <a href="sync.html" class="app-card glass rounded-3xl p-6 flex flex-col items-center justify-center text-center gap-3 animate-fade-in-up delay-200 shadow-xl">
            <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-emerald-400 to-emerald-600 flex items-center justify-center shadow-inner relative">
                <i class="fa-solid fa-laptop-medical text-2xl text-white"></i>
            </div>
            <div>
                <h3 class="font-black text-sm text-white">EQUIPOS</h3>
                <p class="text-[9px] text-white/80 font-bold uppercase tracking-widest mt-1">Control Biológico</p>
            </div>
        </a>

        <a href="admin.html" class="app-card glass rounded-3xl p-6 flex flex-col items-center justify-center text-center gap-3 animate-fade-in-up delay-200 shadow-xl">
            <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-slate-600 to-slate-800 flex items-center justify-center shadow-inner relative">
                <i class="fa-solid fa-user-tie text-2xl text-white"></i>
            </div>
            <div>
                <h3 class="font-black text-sm text-white">ADMIN</h3>
                <p class="text-[9px] text-white/80 font-bold uppercase tracking-widest mt-1">Panel de Control</p>
            </div>
        </a>

    </div>

    <div class="mt-16 text-center animate-fade-in-up delay-200 relative z-10">
        <p class="text-[10px] font-bold tracking-widest text-white/50 uppercase">&copy; 2026</p>
    </div>

</body>
</html>
