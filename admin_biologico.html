            apiKey: "AIzaSyDW-KIxM3m5QXnfzpOUmwhuLILLAk6u5rA",

            messagingSenderId: "1077149571149",

            .print-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 10px; font-family: Arial, sans-serif; text-align: center; }

    <script>
        let serviciosGlobales = []; // Guarda en memoria lo de Firebase

        window.toggleFiltros = function() {
            const panel = document.getElementById('panel-filtros');
            const icon = document.getElementById('icon-filtros');
            panel.classList.toggle('open');
            if(panel.classList.contains('open')) {
                icon.style.transform = 'rotate(180deg)';
            } else {
                icon.style.transform = 'rotate(0deg)';
            }
        };

        window.aplicarFiltroRapido = function(tipo) {
            const hoy = new Date();
            let iStr = '', fStr = `${hoy.getFullYear()}-${String(hoy.getMonth() + 1).padStart(2, '0')}-${String(hoy.getDate()).padStart(2, '0')}`;
            if (tipo === 'semana') { const diff = hoy.getDate() - hoy.getDay() + 1; iStr = `${hoy.getFullYear()}-${String(hoy.getMonth() + 1).padStart(2, '0')}-${String(new Date(hoy.setDate(diff)).getDate()).padStart(2, '0')}`; }
            else if (tipo === 'mes') { iStr = `${hoy.getFullYear()}-${String(hoy.getMonth() + 1).padStart(2, '0')}-01`; }
            else if (tipo === 'año') { iStr = `${hoy.getFullYear()}-01-01`; }
            document.getElementById('f-inicio').value = iStr; document.getElementById('f-fin').value = fStr;
        };

        window.buscarServicios = async function(soloActivosPorDefecto = false) {
            const btn = document.getElementById('btn-buscar');
            if(!soloActivosPorDefecto) { btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Buscando...'; btn.disabled = true; }
            
            const fTipo = document.getElementById('f-tipo') ? document.getElementById('f-tipo').value : 'todos';
            const fIni = document.getElementById('f-inicio').value;
            const fFin = document.getElementById('f-fin').value;
            const fEmp = document.getElementById('f-empresa').value.trim().toUpperCase();

            // Configurar Título UI
            const titulo = document.getElementById('titulo-resultados');
            if(soloActivosPorDefecto) {
                titulo.innerHTML = `<i class="fa-solid fa-tower-cell text-emerald-500 mr-2"></i> Servicios Activos`;
                document.getElementById('f-inicio').value = ''; document.getElementById('f-fin').value = ''; document.getElementById('f-empresa').value = '';
                const panel = document.getElementById('panel-filtros');
                if(panel && panel.classList.contains('open')) toggleFiltros();
            } else {
                titulo.innerHTML = `<i class="fa-solid fa-folder-open text-emerald-500 mr-2"></i> Historial de Servicios`;
            }

            try {
                // Query Optimizada
                const q = window.query(window.collection(window.db, "control_biologico"), window.orderBy("timestamp", "desc"));
                const qs = await window.getDocs(q);
                
                serviciosGlobales = [];
                
                qs.forEach(doc => {
                    const data = doc.data();
                    data.id = doc.id;
                    let pasaFiltro = true;

                    if(fTipo !== "todos" && data.tipo !== fTipo) pasaFiltro = false;
                    
                    if(soloActivosPorDefecto) {
                        if(data.estado !== "activo") pasaFiltro = false;
                    } else {
                        if(fEmp && !data.empresa.toUpperCase().includes(fEmp)) pasaFiltro = false;
                        
                        if(fIni && fFin && pasaFiltro) {
                            let caeEnRango = false;
                            if(data.fecha_inicio >= fIni && data.fecha_inicio <= fFin) caeEnRango = true;
                            
                            if(!caeEnRango && data.bitacora) {
                                for(let b of data.bitacora) {
                                    if(b.fecha >= fIni && b.fecha <= fFin) { caeEnRango = true; break; }
                                }
                            }
                            if(!caeEnRango) pasaFiltro = false;
                        }
                    }

                    if(pasaFiltro) serviciosGlobales.push(data);
                });

                renderizarListadoAcordeon();

            } catch (e) {
                console.error(e);
                alert("Error extrayendo datos de Firebase.");
            }

            if(!soloActivosPorDefecto && btn) { btn.innerHTML = '<i class="fa-solid fa-magnifying-glass"></i> Consultar Historial'; btn.disabled = false; }
        };

        function renderizarListadoAcordeon() {
            const cont = document.getElementById('contenedor-resultados');
            document.getElementById('lbl-resultados').innerText = serviciosGlobales.length;
            cont.innerHTML = "";

            if(serviciosGlobales.length === 0) {
                cont.innerHTML = `<div class="text-center py-10 glass rounded-3xl"><p class="text-sm font-bold text-slate-500">No se encontraron servicios.</p></div>`;
                return;
            }

            serviciosGlobales.forEach((serv, indexServicio) => {
                const icono = serv.tipo === 'audiometria' ? 'fa-headphones text-emerald-500' : 'fa-lungs text-sky-500';
                const bgTag = serv.estado === 'activo' ? 'bg-emerald-100 text-emerald-700 border-emerald-200' : 'bg-slate-200 text-slate-600 border-slate-300';
                const txtTag = serv.estado === 'activo' ? 'ACTIVO' : 'FINALIZADO';
                const numRegs = serv.bitacora ? serv.bitacora.length : 0;
                
                // 👇 ENCABEZADOS ENRIQUECIDOS (Marca, Equipo, Cabina) 👇
                let cabinaBadge = serv.tipo === 'audiometria' && serv.ns_cabina ? `<span class="bg-white/50 px-2 py-0.5 rounded border border-slate-200">Cabina: <b>${serv.ns_cabina}</b></span>` : '';
                
                let thHtml = ''; let trHtml = '';
                
                if(numRegs === 0) {
                    trHtml = `<tr><td colspan="5" class="py-4 text-center text-xs text-slate-400 italic">No hay calibraciones registradas aún.</td></tr>`;
                } else {
                    if(serv.tipo === 'audiometria') {
                        thHtml = `<tr><th class="py-2 px-3 text-left">Fecha</th><th class="py-2 px-3 text-center">Frec. OD Prom</th><th class="py-2 px-3 text-center">Frec. OI Prom</th><th class="py-2 px-3 text-right">Médico</th></tr>`;
                        serv.bitacora.forEach((b, indexBitacora) => {
                            let promOD = b.od ? Object.values(b.od).filter(v=>v).length : 0; 
                            let promOI = b.oi ? Object.values(b.oi).filter(v=>v).length : 0;
                            
                            // 👇 BOTONES INTERACTIVOS PARA MODAL DE AUDIOMETRÍA 👇
                            let btnOD = `<button onclick="abrirDetalleAudio(${indexServicio}, ${indexBitacora})" class="text-red-500 hover:text-red-700 underline decoration-red-300 underline-offset-2"><i class="fa-solid fa-up-right-from-square mr-1"></i>${promOD}/8 capt.</button>`;
                            let btnOI = `<button onclick="abrirDetalleAudio(${indexServicio}, ${indexBitacora})" class="text-blue-500 hover:text-blue-700 underline decoration-blue-300 underline-offset-2"><i class="fa-solid fa-up-right-from-square mr-1"></i>${promOI}/8 capt.</button>`;

                            trHtml += `<tr class="border-t border-slate-100"><td class="py-2 px-3 text-xs font-bold text-slate-600">${b.fecha}</td><td class="py-2 px-3 text-center text-xs font-bold">${btnOD}</td><td class="py-2 px-3 text-center text-xs font-bold">${btnOI}</td><td class="py-2 px-3 text-right text-[10px] font-bold text-slate-500">${b.medico}</td></tr>`;
                        });
                    } else {
                        thHtml = `<tr><th class="py-2 px-3 text-left">Fecha</th><th class="py-2 px-3 text-center">Inspirar %</th><th class="py-2 px-3 text-center">Espirar %</th><th class="py-2 px-3 text-right">Médico</th></tr>`;
                        serv.bitacora.forEach(b => {
                            trHtml += `<tr class="border-t border-slate-100"><td class="py-2 px-3 text-xs font-bold text-slate-600">${b.fecha}</td><td class="py-2 px-3 text-center text-xs text-sky-600 font-bold">${b.inspirar_porcentaje}%</td><td class="py-2 px-3 text-center text-xs text-sky-600 font-bold">${b.espirar_porcentaje}%</td><td class="py-2 px-3 text-right text-[10px] font-bold text-slate-500">${b.medico}</td></tr>`;
                        });
                    }
                }

                const btnFinalizar = serv.estado === 'activo' 
                    ? `<button onclick="finalizarServicio('${serv.id}')" class="w-full mt-4 bg-red-50 hover:bg-red-100 text-red-600 font-bold py-2.5 rounded-lg text-xs transition border border-red-200"><i class="fa-solid fa-power-off mr-1"></i> Finalizar y Archivar Servicio</button>` 
                    : ``;

                cont.innerHTML += `
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                        <div onclick="toggleAcordeon('acordeon-${serv.id}')" class="p-5 cursor-pointer hover:bg-slate-50 transition relative select-none">
                            <div class="absolute top-5 right-5 ${bgTag} border text-[9px] font-black uppercase px-2 py-1 rounded tracking-wider">${txtTag}</div>
                            
                            <h3 class="font-black text-lg text-slate-800 uppercase leading-tight pr-20 mb-2"><i class="fa-solid ${icono} mr-1"></i> ${serv.empresa}</h3>
                            
                            <div class="flex flex-wrap gap-2 text-[10px] font-medium text-slate-500">
                                <span class="bg-slate-100 px-2 py-0.5 rounded border border-slate-200"><i class="fa-regular fa-calendar mr-1"></i> ${serv.fecha_inicio}</span>
                                <span class="bg-slate-100 px-2 py-0.5 rounded border border-slate-200 text-slate-800 font-bold">${serv.equipo}</span>
                                <span class="bg-slate-100 px-2 py-0.5 rounded border border-slate-200"><i class="fa-solid fa-barcode mr-1"></i> ${serv.ns_equipo}</span>
                                ${cabinaBadge}
                            </div>

                            <div class="absolute bottom-5 right-5 text-slate-300 text-xl"><i class="fa-solid fa-chevron-down"></i></div>
                        </div>
                        
                        <div id="acordeon-${serv.id}" class="acordeon-content bg-slate-50 px-5 border-t border-slate-100">
                            <h4 class="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-2 border-b border-slate-200 pb-1">Bitácora Diaria (${numRegs} calibraciones)</h4>
                            <div class="overflow-x-auto bg-white rounded-xl border border-slate-200">
                                <table class="w-full text-left">
                                    <thead class="bg-slate-100 text-[10px] uppercase text-slate-500">${thHtml}</thead>
                                    <tbody>${trHtml}</tbody>
                                </table>
                            </div>
                            ${btnFinalizar}
                        </div>
                    </div>
                `;
            });
        }

        window.toggleAcordeon = function(idDOM) {
            const el = document.getElementById(idDOM);
            el.classList.toggle('open');
        };

        window.finalizarServicio = async function(idFirebase) {
            if(!confirm("¿Estás seguro que deseas marcar este servicio como FINALIZADO?\n\nLos médicos ya no lo verán en su lista de activos para agregar calibraciones.")) return;
            
            try {
                await window.updateDoc(window.doc(window.db, "control_biologico", idFirebase), { estado: "finalizado" });
                alert("Servicio finalizado correctamente.");
                const fIni = document.getElementById('f-inicio').value;
                if(fIni === '') buscarServicios(true); 
                else buscarServicios(false);
            } catch(e) {
                alert("Error al intentar finalizar.");
            }
        };

        // 👇 MODAL INTELIGENTE DE AUDIOMETRÍA 👇
        window.abrirDetalleAudio = function(indexServicio, indexBitacora) {
            const b = serviciosGlobales[indexServicio].bitacora[indexBitacora];
            document.getElementById('mod-audio-fecha').innerText = `Calibración del: ${b.fecha}`;
            
            const gridOD = document.getElementById('grid-od');
            const gridOI = document.getElementById('grid-oi');
            gridOD.innerHTML = ''; gridOI.innerHTML = '';

            const frecs = [250, 500, 1000, 2000, 3000, 4000, 6000, 8000];
            
            frecs.forEach(f => {
                let valOD = (b.od && b.od[f]) ? b.od[f] : '-';
                let valOI = (b.oi && b.oi[f]) ? b.oi[f] : '-';
                
                gridOD.innerHTML += `<div class="bg-white/10 p-1.5 rounded text-xs"><p class="text-[8px] text-white/50 mb-0.5">${f}</p><b class="text-white">${valOD}</b></div>`;
                gridOI.innerHTML += `<div class="bg-white/10 p-1.5 rounded text-xs"><p class="text-[8px] text-white/50 mb-0.5">${f}</p><b class="text-white">${valOI}</b></div>`;
            });

            document.getElementById('modal-audio').classList.remove('hidden');
        };

        window.cerrarModalAudio = function() {
            document.getElementById('modal-audio').classList.add('hidden');
        };

        // =========================================================
        // MOTOR DE RENDERIZADO PDF BLINDADO
        // =========================================================
        window.generarPDFGlobal = function() {
            if(serviciosGlobales.length === 0) {
                alert("No hay servicios en pantalla para generar el PDF."); return;
            }

            const zona = document.getElementById('zona-impresion');
            zona.innerHTML = '';
            let htmlPDF = '';

            // Construir una "hoja" por cada servicio en pantalla
            serviciosGlobales.forEach(data => {
                htmlPDF += '<div class="servicio-print-block">';
                if(data.tipo === 'audiometria') htmlPDF += renderizarPDF_Audiometria(data);
                else htmlPDF += renderizarPDF_Espirometria(data);
                htmlPDF += '</div>';
            });

            zona.innerHTML = htmlPDF;
            
            // Revelar, Imprimir, Ocultar de forma segura
            zona.classList.remove('hidden');
            setTimeout(() => { 
                window.print(); 
                zona.classList.add('hidden');
            }, 800);
        };

        function renderizarPDF_Audiometria(data) {
            let filasBitacora = '';
            if(data.bitacora) {
                data.bitacora.forEach(b => {
                    let oi = b.oi || {}; let od = b.od || {};
                    filasBitacora += `
                    <tr>
                        <td class="bg-verde-lapi">${b.fecha}</td>
                        <td class="bg-rojo-lapi">${od[250]||''}</td><td class="bg-rojo-lapi">${od[500]||''}</td><td class="bg-rojo-lapi">${od[1000]||''}</td><td class="bg-rojo-lapi">${od[2000]||''}</td><td class="bg-rojo-lapi">${od[3000]||''}</td><td class="bg-rojo-lapi">${od[4000]||''}</td><td class="bg-rojo-lapi">${od[6000]||''}</td><td class="bg-rojo-lapi">${od[8000]||''}</td>
                        <td></td> <td>${oi[250]||''}</td><td>${oi[500]||''}</td><td>${oi[1000]||''}</td><td>${oi[2000]||''}</td><td>${oi[3000]||''}</td><td>${oi[4000]||''}</td><td>${oi[6000]||''}</td><td>${oi[8000]||''}</td>
                        <td class="bg-verde-lapi" style="padding: 2px;">
                            <div style="font-size: 8px; line-height: 1;">${b.medico}</div>
                            ${b.firma ? `<img src="${b.firma}" class="firma-img">` : ''}
                        </td>
                    </tr>`;
                });
            }

            for(let i = (data.bitacora ? data.bitacora.length : 0); i < 15; i++) {
                filasBitacora += `<tr><td class="bg-verde-lapi" style="height: 25px;"></td><td class="bg-rojo-lapi"></td><td class="bg-rojo-lapi"></td><td class="bg-rojo-lapi"></td><td class="bg-rojo-lapi"></td><td class="bg-rojo-lapi"></td><td class="bg-rojo-lapi"></td><td class="bg-rojo-lapi"></td><td class="bg-rojo-lapi"></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td class="bg-verde-lapi"></td></tr>`;
            }

            return `
                <table class="header-box">
                    <tr>
                        <td style="width: 25%; text-align: center; vertical-align: middle;">
                            <img src="logoLAPI.png" style="max-width: 150px; max-height: 65px; display: block; margin: 0 auto;">
                        </td>
                        <td style="width: 50%;" class="header-title">CONTROL BIOLÓGICO<br>AUDIOMETRÍAS</td>
                        <td style="width: 25%; padding: 0;">
                            <table style="width: 100%; height: 100%; border-collapse: collapse; text-align: center; border: none;">
                                <tr><td style="border-top: none; border-left: none; font-weight: bold; width: 50%;">Código:</td><td style="border-top: none; border-right: none;">F-55-P11</td></tr>
                                <tr><td style="border-left: none; font-weight: bold;">Versión:</td><td style="border-right: none;">1</td></tr>
                                <tr><td style="border-left: none; font-weight: bold;">Fecha de<br>actualización:</td><td style="border-right: none;">05-Agosto-23</td></tr>
                                <tr><td style="border-bottom: none; border-left: none; font-weight: bold;">Página:</td><td style="border-bottom: none; border-right: none;">1 de 1</td></tr>
                            </table>
                        </td>
                    </tr>
                </table>

                <h3 style="text-align: center; font-family: Arial; font-weight: normal; margin-bottom: 20px;">CONTROL BIOLÓGICO</h3>

                <div class="info-grid">
                    <div class="info-col">
                        <div style="margin-bottom: 5px;">AUDIÓMETRO: <span class="line-field">${data.equipo}</span></div>
                        <div style="margin-bottom: 5px;">EMPRESA: <span class="line-field">${data.empresa}</span></div>
                        <div style="margin-bottom: 5px;">FECHA INICIO: <span class="line-field">${data.fecha_inicio}</span></div>
                    </div>
                    <div class="info-col">
                        <div style="margin-bottom: 15px;">N/S: <span class="line-field">${data.ns_equipo}</span></div>
                        <div style="margin-bottom: 5px;">N/S CABINA: <span class="line-field">${data.ns_cabina || ''}</span></div>
                    </div>
                </div>

                <div style="display: flex; justify-content: space-around; font-family: Arial; font-weight: bold; margin-bottom: 5px; font-size: 14px;">
                    <div style="width: 45%; text-align: center;">OIDO DERECHO</div>
                    <div style="width: 45%; text-align: center;">OIDO IZQUIERDO</div>
                </div>

                <table class="print-table">
                    <thead>
                        <tr>
                            <th rowspan="2" class="bg-verde-lapi">FECHA</th>
                            <th colspan="8" class="bg-rojo-lapi"></th>
                            <th rowspan="2" style="background: white !important; border-top: none; border-bottom: none;"></th>
                            <th colspan="8"></th>
                            <th rowspan="2" class="bg-verde-lapi">REALIZÓ<br>NOMBRE Y FIRMA</th>
                        </tr>
                        <tr>
                            <th class="bg-rojo-lapi">250</th><th class="bg-rojo-lapi">500</th><th class="bg-rojo-lapi">1000</th><th class="bg-rojo-lapi">2000</th><th class="bg-rojo-lapi">3000</th><th class="bg-rojo-lapi">4000</th><th class="bg-rojo-lapi">6000</th><th class="bg-rojo-lapi">8000</th>
                            <th>250</th><th>500</th><th>1000</th><th>2000</th><th>3000</th><th>4000</th><th>6000</th><th>8000</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${filasBitacora}
                    </tbody>
                </table>
            `;
        }

        function renderizarPDF_Espirometria(data) {
            let filasBitacora = '';
            let fechasServicio = data.fecha_inicio;
            
            if(data.bitacora && data.bitacora.length > 0) {
                const ultima = data.bitacora[data.bitacora.length - 1].fecha;
                if(data.fecha_inicio !== ultima) fechasServicio = `${data.fecha_inicio} al ${ultima}`;
            }

            if(data.bitacora) {
                data.bitacora.forEach(b => {
                    filasBitacora += `
                    <tr>
                        <td style="font-weight: bold; padding: 4px;">${b.fecha}</td>
                        <td style="padding: 4px;">${b.inspirar_porcentaje || ''} %</td>
                        <td style="padding: 4px;">${b.espirar_porcentaje || ''} %</td>
                        <td style="font-size: 10px; font-weight: bold; padding: 4px;">${b.medico}</td>
                        <td style="padding: 2px;">${b.firma ? `<img src="${b.firma}" class="firma-img">` : ''}</td>
                    </tr>`;
                });
            }

            for(let i = (data.bitacora ? data.bitacora.length : 0); i < 15; i++) {
                filasBitacora += `<tr><td style="height: 30px;"></td><td></td><td></td><td></td><td></td></tr>`;
            }

            return `
                <table class="header-box">
                    <tr>
                        <td style="width: 25%; text-align: center; vertical-align: middle;">
                            <img src="logoLAPI.png" style="max-width: 150px; max-height: 65px; display: block; margin: 0 auto;">
                        </td>
                        <td style="width: 50%;" class="header-title">CONTROL BIOLÓGICO<br>ESPIROMETRÍA</td>
                        <td style="width: 25%; padding: 0;">
                            <table style="width: 100%; height: 100%; border-collapse: collapse; text-align: center; border: none;">
                                <tr><td style="border-top: none; border-left: none; font-weight: bold; width: 50%;">Código:</td><td style="border-top: none; border-right: none;">F-56-P11</td></tr>
                                <tr><td style="border-left: none; font-weight: bold;">Versión:</td><td style="border-right: none;">1</td></tr>
                                <tr><td style="border-left: none; font-weight: bold;">Fecha de<br>actualización:</td><td style="border-right: none;">05-Agosto-23</td></tr>
                                <tr><td style="border-bottom: none; border-left: none; font-weight: bold;">Página:</td><td style="border-bottom: none; border-right: none;">1 de 1</td></tr>
                            </table>
                        </td>
                    </tr>
                </table>

                <div class="info-grid">
                    <div class="info-col">
                        <div style="margin-bottom: 5px;">ESPIRÓMETRO: <span class="line-field">${data.equipo}</span></div>
                        <div style="margin-bottom: 5px;">EMPRESA: <span class="line-field">${data.empresa}</span></div>
                    </div>
                    <div class="info-col">
                        <div style="margin-bottom: 5px;">N/S: <span class="line-field">${data.ns_equipo}</span></div>
                        <div style="margin-bottom: 5px;">FECHAS DEL SERVICIO: <span class="line-field">${fechasServicio}</span></div>
                    </div>
                </div>

                <table class="print-table" style="font-size: 12px;">
                    <thead>
                        <tr>
                            <th rowspan="2" style="width: 15%;">FECHA</th>
                            <th colspan="2">DIFERENCIA RELATIVA AL VOLUMEN INDICADO</th>
                            <th colspan="2">REALIZÓ</th>
                        </tr>
                        <tr>
                            <th style="width: 20%;">INSPIRAR %</th>
                            <th style="width: 20%;">ESPIRAR %</th>
                            <th style="width: 25%;">NOMBRE</th>
                            <th style="width: 20%;">FIRMA</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${filasBitacora}
                    </tbody>
                </table>
            `;
        }
    </script>
</body>
</html>
