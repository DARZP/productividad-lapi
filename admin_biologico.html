    <script>
        let serviciosGlobales = []; 

        window.aplicarFiltroRapido = function(tipo) {
            document.querySelectorAll('.btn-filtro-rapido').forEach(btn => {
                btn.classList.remove('bg-orange-100', 'text-orange-700');
                btn.classList.add('bg-slate-100', 'text-slate-600');
            });
            const btnActivo = document.getElementById(`btn-${tipo}`);
            if(btnActivo) {
                btnActivo.classList.remove('bg-slate-100', 'text-slate-600');
                btnActivo.classList.add('bg-orange-100', 'text-orange-700');
            }

            const hoy = new Date();
            let iStr = '', fStr = `${hoy.getFullYear()}-${String(hoy.getMonth() + 1).padStart(2, '0')}-${String(hoy.getDate()).padStart(2, '0')}`;
            if (tipo === 'hoy') iStr = fStr; 
            else if (tipo === 'ayer') { const ayer = new Date(); ayer.setDate(ayer.getDate() - 1); iStr = `${ayer.getFullYear()}-${String(ayer.getMonth() + 1).padStart(2, '0')}-${String(ayer.getDate()).padStart(2, '0')}`; fStr = iStr; }
            else if (tipo === 'semana') { const diff = hoy.getDate() - hoy.getDay() + 1; iStr = `${hoy.getFullYear()}-${String(hoy.getMonth() + 1).padStart(2, '0')}-${String(new Date(hoy.setDate(diff)).getDate()).padStart(2, '0')}`; }
            else if (tipo === 'mes') { iStr = `${hoy.getFullYear()}-${String(hoy.getMonth() + 1).padStart(2, '0')}-01`; }
            else if (tipo === 'año') { iStr = `${hoy.getFullYear()}-01-01`; }
            else if (tipo === 'todo') { iStr = ''; fStr = ''; }
            
            document.getElementById('f-inicio').value = iStr; 
            document.getElementById('f-fin').value = fStr;
        };

        window.buscarServicios = async function(soloActivosPorDefecto = false) {
            const btn = document.getElementById('btn-buscar');
            if(!soloActivosPorDefecto && btn) { btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>'; btn.disabled = true; }
            
            const fTipo = document.getElementById('f-tipo') ? document.getElementById('f-tipo').value : 'todos';
            const fIni = document.getElementById('f-inicio').value;
            const fFin = document.getElementById('f-fin').value;
            const fEmp = document.getElementById('f-empresa').value.trim().toUpperCase();

            const titulo = document.getElementById('titulo-resultados');
            if(soloActivosPorDefecto) {
                titulo.innerHTML = `<i class="fa-solid fa-tower-cell text-orange-500 mr-2"></i> Equipos Activos (<span id="lbl-resultados">0</span>)`;
                document.getElementById('f-inicio').value = ''; document.getElementById('f-fin').value = ''; document.getElementById('f-empresa').value = '';
                document.querySelectorAll('.btn-filtro-rapido').forEach(btn => {
                    btn.classList.remove('bg-orange-100', 'text-orange-700');
                    btn.classList.add('bg-slate-100', 'text-slate-600');
                });
            } else {
                titulo.innerHTML = `<i class="fa-solid fa-folder-open text-orange-500 mr-2"></i> Historial de Equipos (<span id="lbl-resultados">0</span>)`;
            }

            try {
                // 1. OBTENER DIRECTORIO DE SERVICIOS ACTIVOS PARA CRUCE
                const qDir = window.query(window.collection(window.db, "directorio_servicios"), window.where("estado", "==", "activo"));
                const qsDir = await window.getDocs(qDir);
                let idServiciosActivos = new Set();
                qsDir.forEach(d => idServiciosActivos.add(d.id));

                // 2. OBTENER CONTROL BIOLÓGICO
                const q = window.query(window.collection(window.db, "control_biologico"), window.orderBy("timestamp", "desc"));
                const qs = await window.getDocs(q);
                
                serviciosGlobales = [];
                
                qs.forEach(doc => {
                    const data = doc.data();
                    data.id = doc.id;
                    let pasaFiltro = true;

                    // Si está activo pero el servicio "matriz" ya no está activo, lo tratamos como inactivo visualmente
                    if(data.estado === 'activo' && data.idServicio && !idServiciosActivos.has(data.idServicio)) {
                        data.estado = 'finalizado'; 
                    }

                    if(fTipo !== "todos" && data.tipo !== fTipo) pasaFiltro = false;
                    
                    if(soloActivosPorDefecto) {
                        if(data.estado !== "activo") pasaFiltro = false;
                    } else {
                        if(fEmp && !data.empresa.toUpperCase().includes(fEmp)) pasaFiltro = false;
                        if(fIni && fFin && pasaFiltro) {
                            let caeEnRango = false;
                            if(data.fecha_inicio >= fIni && data.fecha_inicio <= fFin) caeEnRango = true;
                            if(!caeEnRango && data.bitacora) {
                                for(let b of data.bitacora) {
                                    if(b.fecha >= fIni && b.fecha <= fFin) { caeEnRango = true; break; }
                                }
                            }
                            if(!caeEnRango) pasaFiltro = false;
                        }
                    }

                    if(pasaFiltro) serviciosGlobales.push(data);
                });

                renderizarListadoAcordeon();

            } catch (e) {
                console.error(e);
                alert("Error extrayendo datos de Firebase.");
            }

            if(!soloActivosPorDefecto && btn) { btn.innerHTML = '<i class="fa-solid fa-magnifying-glass"></i> Consultar'; btn.disabled = false; }
        };

        window.abrirModalRol = function() {
            const hoy = new Date();
            const yyyy = hoy.getFullYear();
            const mm = String(hoy.getMonth() + 1).padStart(2, '0');
            const dd = String(hoy.getDate()).padStart(2, '0');
            document.getElementById('rol-fecha').value = `${yyyy}-${mm}-${dd}`; // Se asume el día actual por defecto
            abrirModal('rol');

        window.analizarImagenRol = async function() {
            const fileInput = document.getElementById('img-rol');
            const apiKey = document.getElementById('gemini-api-key-rol').value.trim();
            const fechaTest = document.getElementById('rol-fecha').value;
            
            if(!fileInput.files.length) return mostrarToast("Sube el Rol", "error");
            if(!apiKey || !fechaTest) return mostrarToast("Revisa tus datos", "error");
            localStorage.setItem('gemini_api_key', apiKey);

            const btn = document.getElementById('btn-analizar-rol');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Analizando...'; btn.disabled = true;

            const reader = new FileReader();
            reader.onload = async function(e) {
                const base64Data = e.target.result.split(',')[1];
                const promptEstricto = `Extrae únicamente los nombres de las empresas de la imagen adjunta y devuélvelas en un arreglo JSON válido (ej. ["BIMBO", "ECOLAB"]). Sin formato markdown extra.`;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [ { text: promptEstricto }, { inlineData: { mimeType: fileInput.files[0].type, data: base64Data } } ] }] })
                    });
                    if(!response.ok) throw new Error("API Falló");
                    const dataRes = await response.json();
                    let text = dataRes.candidates[0].content.parts[0].text.replace(/```json/g, '').replace(/```/g, '').trim();
                    const arreglo = JSON.parse(text);

                    empresasEnRol = arreglo;
                    fechaRolOperativo = fechaTest;
                    localStorage.setItem('lapi_rol_ia_bio', JSON.stringify({ fecha: fechaTest, empresas: arreglo }));
                    
                    document.getElementById('status-rol-activo').classList.remove('hidden');
                    document.getElementById('txt-fecha-rol').innerText = `Día Evaluado: ${fechaTest}`;
                    document.getElementById('txt-cantidad-rol').innerText = `${arreglo.length} empresas en ruta`;

                    renderizarListadoAcordeon(); 
                    cerrarModal('rol');
                    mostrarToast("Rol de Biológico actualizado", "exito");
                } catch(err) { mostrarToast("Error leyendo la imagen", "error"); }
                
                btn.innerHTML = '<i class="fa-solid fa-eye"></i> Analizar Rol y Activar Semáforo'; btn.disabled = false;
            };
            reader.readAsDataURL(fileInput.files[0]);
        };

            empresasEnRol = []; fechaRolOperativo = null;

        window.ejecutarReportePersonalizado = async function() {
            const btn = document.getElementById('btn-generar-pdf-avanzado');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Construyendo...'; btn.disabled = true;

            const modo = document.getElementById('rep-modo').value;
            const fIni = document.getElementById('rep-f-ini').value;
            const fFin = document.getElementById('rep-f-fin').value;
            const zona = document.getElementById('zona-impresion');
            
            try {
                // Hacemos una consulta limpia a la BD en lugar de usar la variable local para no perder data.
                const q = window.query(window.collection(window.db, "control_biologico"), window.orderBy("timestamp", "asc"));
                const qs = await window.getDocs(q);
                let equiposAImprimir = [];

                qs.forEach(doc => {
                    let s = doc.data();
                    let pasaFiltro = true;

                    if(modo === 'estudio') {
                        if(s.tipo !== document.getElementById('rep-estudio-val').value) pasaFiltro = false;
                    } else {
                        if(s.ns_equipo.toUpperCase() !== document.getElementById('rep-ns-val').value.trim().toUpperCase()) pasaFiltro = false;
                    }

                    if(pasaFiltro) {
                        // Filtramos estrictamente la bitácora interna por las fechas
                        if(fIni && fFin && s.bitacora) {
                            s.bitacora = s.bitacora.filter(b => b.fecha >= fIni && b.fecha <= fFin);
                        }
                        // Solo incluimos equipos que sí tuvieron calibraciones en esas fechas
                        if(s.bitacora && s.bitacora.length > 0) {
                            equiposAImprimir.push(s);
                        }
                    }
                });

                if(equiposAImprimir.length === 0) {
                    alert("No se encontraron registros de calibración con los parámetros ingresados.");
                    btn.innerHTML = '<i class="fa-solid fa-print"></i> Consultar e Imprimir'; btn.disabled = false;
                    return;
                }

                // Armado del HTML
                zona.innerHTML = ''; let htmlPDF = '';
                equiposAImprimir.forEach(data => {
                    htmlPDF += '<div class="servicio-print-block">';
                    if(data.tipo === 'audiometria') htmlPDF += renderizarPDF_Audiometria(data);
                    else htmlPDF += renderizarPDF_Espirometria(data);
                    htmlPDF += '</div>';

                zona.innerHTML = htmlPDF;

                cerrarModalReporte();
