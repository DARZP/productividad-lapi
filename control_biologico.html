    <script>
        let docIdActivo = null;
        let tipoControlActivo = null; 
        
        // FIRMA DIGITAL VARIABLES
        const canvas = document.getElementById('canvas-firma');
        const ctx = canvas.getContext('2d');
        let dibujando = false;

        document.addEventListener("DOMContentLoaded", () => {
            const datalistMedicos = document.getElementById('lista-medicos');
            if(window.LAPI_CONFIG && window.LAPI_CONFIG.medicos) {
                datalistMedicos.innerHTML = window.LAPI_CONFIG.medicos.map(m => `<option value="${m}">`).join('');
            }

            cambiarTipoFormulario();
            cargarDirectorioServicios();
            cargarEquiposActivos();
            configurarCanvas();
        });

        function mostrarToast(mensaje, tipo = 'error') {
            const toast = document.createElement('div');
            const color = tipo === 'exito' ? 'bg-emerald-500' : 'bg-red-500';
            const icono = tipo === 'exito' ? 'fa-check-circle' : 'fa-triangle-exclamation';
            toast.className = `${color} text-white px-4 py-3 rounded-xl shadow-2xl font-bold text-sm flex items-center gap-3 transform transition-all duration-300 translate-x-full opacity-0 z-[300] max-w-xs`;
            toast.innerHTML = `<i class="fa-solid ${icono} text-lg"></i> <span class="leading-tight">${mensaje}</span>`;
            document.getElementById('toast-container').appendChild(toast);
            setTimeout(() => toast.classList.remove('translate-x-full', 'opacity-0'), 10);
            setTimeout(() => { toast.classList.add('translate-x-full', 'opacity-0'); setTimeout(() => toast.remove(), 300); }, 3500);
        }

        window.cambiarTipoFormulario = function() {
            const tipo = document.querySelector('input[name="tipoControl"]:checked').value;
            const selectEquipo = document.getElementById('ns-equipo');
            const contCabina = document.getElementById('contenedor-cabina');
            const lblEquipo = document.getElementById('lbl-equipo');

            selectEquipo.innerHTML = '<option value="" disabled selected class="text-white/60">SELECCIONE...</option>';

            if (tipo === 'audiometria') {
                lblEquipo.innerText = "Audiómetro";
                selectEquipo.innerHTML += `
                    <option value="INTERACOUSTICS" class="text-slate-800">INTERACOUSTICS</option>
                    <option value="MADSEN ITERA II" class="text-slate-800">MADSEN ITERA II</option>
                `;
                contCabina.classList.remove('hidden');
            } else {
                lblEquipo.innerText = "Espirómetro";
                selectEquipo.innerHTML += `
                    <option value="MEDKRO- PRO" class="text-slate-800">MEDKRO- PRO</option>
                `;
                contCabina.classList.add('hidden');
            }
        }

        async function cargarDirectorioServicios() {
            const select = document.getElementById('ns-servicio');
            try {
                const q = window.query(window.collection(window.db, "directorio_servicios"), window.where("estado", "==", "activo"));
                const qs = await window.getDocs(q);
                
                if (qs.empty) {
                    select.innerHTML = '<option value="" disabled selected class="text-black">No hay servicios activos.</option>';
                    return;
                }

                // Arreglo temporal
                let listaTemporal = [];
                qs.forEach(doc => {
                    let d = doc.data();
                    d.id = doc.id;
                    listaTemporal.push(d);
                });

                // ORDEN ALFABÉTICO (A-Z)
                listaTemporal.sort((a, b) => a.nombreComercial.localeCompare(b.nombreComercial));

                let html = '<option value="" disabled selected class="text-black">Selecciona la empresa...</option>';
                listaTemporal.forEach(d => { 
                    html += `<option value="${d.id}" class="text-black">${d.nombreComercial}</option>`; 
                });
                
                select.innerHTML = html;
            } catch (e) {
                select.innerHTML = '<option value="" disabled selected class="text-black">Error cargando servicios.</option>';
            }
        }

        // CARGAR EQUIPOS DE LA COLECCIÓN DE CONTROL BIOLÓGICO
        async function cargarEquiposActivos() {
            const cont = document.getElementById('contenedor-servicios');
            try {
                const q = window.query(window.collection(window.db, "control_biologico"), window.where("estado", "==", "activo"));
                const qs = await window.getDocs(q);
                cont.innerHTML = "";
                
                if(qs.empty) {
                    cont.innerHTML = `<div class="text-center py-6 glass rounded-2xl"><p class="text-sm font-bold text-orange-100">No hay equipos biológicos activos.</p></div>`;
                    return;
                }

                qs.forEach(doc => {
                    const d = doc.data();
                    const numRegistros = d.bitacora ? d.bitacora.length : 0;
                    const icono = d.tipo === 'audiometria' ? 'fa-headphones' : 'fa-lungs';
                    
                    cont.innerHTML += `
                        <div onclick="abrirCaptura('${doc.id}', '${d.tipo}', '${d.empresa}', '${d.equipo}', '${d.ns_equipo}', '${d.ns_cabina || ''}', '${d.fecha_inicio}')" class="glass p-4 rounded-2xl cursor-pointer hover:bg-white/30 transition border-l-4 border-white/50 flex justify-between items-center shadow-sm active:scale-95">
                            <div class="w-3/4">
                                <h3 class="font-black text-sm uppercase text-white truncate">${d.empresa}</h3>
                                <p class="text-[10px] text-white/90 font-medium uppercase mt-1"><i class="fa-solid ${icono} mr-1 text-orange-300"></i> ${d.equipo}</p>
                                <p class="text-xs text-white font-bold uppercase mt-1"><i class="fa-solid fa-barcode mr-1 opacity-70"></i> N/S: <span class="text-orange-200">${d.ns_equipo}</span></p>
                            </div>
                            <div class="text-right shrink-0">
                                <span class="bg-white/20 px-3 py-1 rounded-lg text-xs font-black text-white shadow-inner"><i class="fa-solid fa-list-check mr-1 text-orange-200"></i> ${numRegistros}</span>
                            </div>
                        </div>
                    `;
                });
            } catch(e) { cont.innerHTML = `<div class="text-center text-red-200 text-xs font-bold">Error cargando nube.</div>`; }
        }

        window.abrirNuevoServicio = () => { document.getElementById('vista-lista').classList.add('hidden'); document.getElementById('vista-nuevo').classList.remove('hidden'); }
        window.volverLista = () => { document.getElementById('vista-nuevo').classList.add('hidden'); document.getElementById('vista-captura').classList.add('hidden'); document.getElementById('vista-lista').classList.remove('hidden'); docIdActivo = null; tipoControlActivo = null; cargarEquiposActivos(); }
        
        window.abrirCaptura = (id, tipo, emp, eq, ns, cab, fec) => {
            docIdActivo = id;
            tipoControlActivo = tipo; 

            document.getElementById('cap-empresa').innerText = emp;
            document.getElementById('cap-equipo').innerText = eq;
            document.getElementById('cap-ns').innerText = ns;
            
            if(tipo === 'audiometria') {
                document.getElementById('icon-equipo').className = "fa-solid fa-headphones mr-1";
                document.getElementById('p-cabina').classList.remove('hidden');
                document.getElementById('cap-cab').innerText = cab;
                document.getElementById('modulo-audiometria').classList.remove('hidden');
                document.getElementById('modulo-espirometria').classList.add('hidden');
            } else {
                document.getElementById('icon-equipo').className = "fa-solid fa-lungs mr-1";
                document.getElementById('p-cabina').classList.add('hidden'); 
                document.getElementById('modulo-audiometria').classList.add('hidden');
                document.getElementById('modulo-espirometria').classList.remove('hidden');
            }
            
            document.querySelectorAll('#vista-captura input[type="number"]').forEach(inp => inp.value = '');
            document.getElementById('cap-medico').value = '';
            limpiarFirma();

            document.getElementById('vista-lista').classList.add('hidden');
            document.getElementById('vista-captura').classList.remove('hidden');
            ajustarCanvas(); 
        }

        window.guardarNuevoServicio = async function() {
            const tipo = document.querySelector('input[name="tipoControl"]:checked').value;
            const selServicio = document.getElementById('ns-servicio');
            const eq = document.getElementById('ns-equipo').value;
            const ns = document.getElementById('ns-serie').value.trim().toUpperCase();
            
            if(!selServicio.value) return mostrarToast("Seleccione una campaña de la lista.");
            const emp = selServicio.options[selServicio.selectedIndex].text;
            const idServicio = selServicio.value;

            let cab = "";
            if (tipo === 'audiometria') {
                cab = document.getElementById('ns-cabina').value.trim().toUpperCase();
                if(!cab) return mostrarToast("Falta N/S de Cabina.");
            }

            if(!eq || !ns) return mostrarToast("Llena todos los campos del equipo.");
            
            const fec = new Date().toISOString().split('T')[0]; // Fecha actual oculta

            const btn = document.getElementById('btn-guardar-cabecera');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Vinculando...'; btn.disabled = true;

            const nuevoDoc = {
                tipo: tipo,
                estado: "activo",
                idServicio: idServicio, // Vinculado a directorio_servicios
                empresa: emp,
                equipo: eq,
                ns_equipo: ns,
                fecha_inicio: fec,
                bitacora: [],
                timestamp: new Date()
            };

            if (tipo === 'audiometria') nuevoDoc.ns_cabina = cab;

            try {
                const docRef = await window.addDoc(window.collection(window.db, "control_biologico"), nuevoDoc);
                btn.innerHTML = '<i class="fa-solid fa-check"></i> Activar y Generar Bitácora'; btn.disabled = false;
                
                document.getElementById('ns-servicio').value = ''; document.getElementById('ns-serie').value = ''; document.getElementById('ns-cabina').value = '';
                
                abrirCaptura(docRef.id, tipo, emp, eq, ns, cab, fec);
            } catch(e) {
                mostrarToast("Error de conexión."); btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-check"></i> Intentar de nuevo';
            }
        }

        window.guardarBitacoraDiaria = async function() {
            const med = document.getElementById('cap-medico').value.trim().toUpperCase();
            if(!med) return mostrarToast("Seleccione o escriba el nombre del médico.");
            
            const blank = document.createElement('canvas');
            blank.width = canvas.width; blank.height = canvas.height;
            if(canvas.toDataURL() === blank.toDataURL()) return mostrarToast("La firma es obligatoria.");

            let registroHoy = {
                fecha: new Date().toISOString().split('T')[0],
                timestamp: new Date(),
                medico: med,
                firma: canvas.toDataURL('image/png', 0.5) 
            };

            if (tipoControlActivo === 'audiometria') {
                const frecs = [250, 500, 1000, 2000, 3000, 4000, 6000, 8000];
                let od = {}, oi = {};
                for(let f of frecs) {
                    od[f] = document.getElementById(`od-${f}`).value;
                    oi[f] = document.getElementById(`oi-${f}`).value;
                }
                registroHoy.od = od;
                registroHoy.oi = oi;
            } else {
                const insp = document.getElementById('espiro-insp').value;
                const esp = document.getElementById('espiro-esp').value;
                if(!insp || !esp) return mostrarToast("Llena los campos Inspirar % y Espirar %.");
                registroHoy.inspirar_porcentaje = insp;
                registroHoy.espirar_porcentaje = esp;
            }

            const btn = document.getElementById('btn-enviar-bitacora');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Guardando...'; btn.disabled = true;

            try {
                const docRef = window.doc(window.db, "control_biologico", docIdActivo);
                await window.updateDoc(docRef, { bitacora: window.arrayUnion(registroHoy) });
                mostrarToast("Control Biológico del día guardado.", "exito");
                setTimeout(() => volverLista(), 1500);
            } catch(e) {
                mostrarToast("Error guardando Control Biológico.");
            }
            btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> Guardar Control Biológico'; btn.disabled = false;
        }

        // ==========================================
        // LÓGICA DE FIRMA DIGITAL EN CANVAS
        // ==========================================
        function configurarCanvas() {
            ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.strokeStyle = '#0f172a';

            canvas.addEventListener('mousedown', iniciarDibujo);
            canvas.addEventListener('mousemove', dibujar);
            canvas.addEventListener('mouseup', detenerDibujo);
            canvas.addEventListener('mouseout', detenerDibujo);

            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault(); const touch = e.touches[0];
                const mouseEvent = new MouseEvent("mousedown", { clientX: touch.clientX, clientY: touch.clientY });
                canvas.dispatchEvent(mouseEvent);
            }, { passive: false });
            
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault(); const touch = e.touches[0];
                const mouseEvent = new MouseEvent("mousemove", { clientX: touch.clientX, clientY: touch.clientY });
                canvas.dispatchEvent(mouseEvent);
            }, { passive: false });

            canvas.addEventListener('touchend', () => canvas.dispatchEvent(new MouseEvent("mouseup")));
            window.addEventListener('resize', ajustarCanvas);
        }

        function ajustarCanvas() {
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height || 150;
            ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.strokeStyle = '#0f172a';
        }

        function obtenerPosicion(e) {
            const rect = canvas.getBoundingClientRect();
            return { x: e.clientX - rect.left, y: e.clientY - rect.top };
        }

        function iniciarDibujo(e) { dibujando = true; ctx.beginPath(); const pos = obtenerPosicion(e); ctx.moveTo(pos.x, pos.y); }
        function dibujar(e) { if (!dibujando) return; const pos = obtenerPosicion(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); }
        function detenerDibujo() { dibujando = false; ctx.closePath(); }
        window.limpiarFirma = () => { ctx.clearRect(0, 0, canvas.width, canvas.height); }

    </script>
