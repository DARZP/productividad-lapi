<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global - LAPI Admin</title>
    
    <link rel="manifest" href="manifest_admin.json">
    <meta name="theme-color" content="#7c3aed">
    <link rel="apple-touch-icon" href="icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDW-KIxM3m5QXnfzpOUmwhuLILLAk6u5rA",
            authDomain: "lapi-productividad.firebaseapp.com",
            projectId: "lapi-productividad",
            storageBucket: "lapi-productividad.firebasestorage.app",
            messagingSenderId: "1077149571149",
            appId: "1:1077149571149:web:e1423dde4a8de6f8562404"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.getDocs = getDocs;
        window.collection = collection;
        window.query = query;
        window.orderBy = orderBy;
        window.doc = doc;
        window.deleteDoc = deleteDoc;
        window.updateDoc = updateDoc;

        window.iniciarAdmin();
    </script>
    
    <style>
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.8); }
        .scroll-custom::-webkit-scrollbar { height: 6px; width: 6px; }
        .scroll-custom::-webkit-scrollbar-track { background: #f1f5f9; }
        .scroll-custom::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        /* Safe area for mobile bottom nav */
        .pb-safe { padding-bottom: calc(env(safe-area-inset-bottom) + 80px); }
    </style>
</head>
<body class="text-slate-800 flex h-screen overflow-hidden">

    <nav class="fixed bottom-0 w-full bg-white/90 backdrop-blur-md border-t border-slate-200 z-50 md:relative md:w-24 md:h-screen md:border-t-0 md:border-r flex md:flex-col justify-around md:justify-start items-center pb-4 pt-2 md:pt-8 gap-1 md:gap-6 shadow-[0_-4px_20px_rgba(0,0,0,0.05)] md:shadow-[4px_0_20px_rgba(0,0,0,0.05)]">
        <div class="hidden md:flex mb-6 text-purple-600 text-3xl"><i class="fa-solid fa-staff-snake"></i></div>
        
        <a href="admin.html" class="flex flex-col items-center p-2 text-purple-600 group">
            <div class="w-12 h-12 rounded-2xl flex items-center justify-center bg-purple-100 text-purple-600 transition-all shadow-sm"><i class="fa-solid fa-globe text-xl"></i></div>
            <span class="text-[10px] font-black mt-1 tracking-widest uppercase">Global</span>
        </a>
        <a href="reportes.html" class="flex flex-col items-center p-2 text-slate-400 hover:text-indigo-600 group transition-all">
            <div class="w-12 h-12 rounded-2xl flex items-center justify-center group-hover:bg-indigo-50 transition-all"><i class="fa-solid fa-chart-pie text-xl"></i></div>
            <span class="text-[10px] font-bold mt-1 tracking-widest uppercase">Reportes</span>
        </a>
        <a href="auditoria.html" class="flex flex-col items-center p-2 text-slate-400 hover:text-emerald-600 group transition-all">
            <div class="w-12 h-12 rounded-2xl flex items-center justify-center group-hover:bg-emerald-50 transition-all"><i class="fa-solid fa-shield-halved text-xl"></i></div>
            <span class="text-[10px] font-bold mt-1 tracking-widest uppercase">Auditoría</span>
        </a>
    </nav>

    <main class="flex-1 overflow-y-auto scroll-custom p-4 md:p-8 pb-safe md:pb-8">
        
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 bg-gradient-to-r from-purple-700 to-indigo-600 p-6 rounded-3xl shadow-xl text-white gap-4">
            <div>
                <h1 class="text-3xl font-black tracking-tight flex items-center gap-3">
                    <i class="fa-solid fa-server text-purple-300"></i> MONITOR GLOBAL
                </h1>
                <p class="opacity-90 text-sm font-medium mt-1 uppercase tracking-widest text-purple-200">Base de Datos Operativa</p>
            </div>
            <div class="flex gap-2 bg-black/20 p-1.5 rounded-xl text-sm font-bold items-center px-4">
                <i class="fa-solid fa-circle-nodes text-emerald-400 animate-pulse"></i> Sync Activo
            </div>
        </div>

        <div class="glass p-5 rounded-3xl shadow-sm mb-6 flex flex-col md:flex-row gap-4 justify-between items-center border-l-4 border-purple-500">
            <div class="flex flex-wrap gap-2 w-full md:w-auto">
                <button onclick="aplicarFiltroRapido('hoy')" class="flex-1 md:flex-none bg-slate-100 hover:bg-purple-50 text-slate-600 hover:text-purple-700 text-xs font-black px-4 py-2.5 rounded-xl transition-colors uppercase tracking-widest">Hoy</button>
                <button onclick="aplicarFiltroRapido('ayer')" class="flex-1 md:flex-none bg-slate-100 hover:bg-purple-50 text-slate-600 hover:text-purple-700 text-xs font-black px-4 py-2.5 rounded-xl transition-colors uppercase tracking-widest">Ayer</button>
                <button onclick="aplicarFiltroRapido('semana')" class="flex-1 md:flex-none bg-slate-100 hover:bg-purple-50 text-slate-600 hover:text-purple-700 text-xs font-black px-4 py-2.5 rounded-xl transition-colors uppercase tracking-widest">Semana</button>
                <button onclick="aplicarFiltroRapido('todo')" class="flex-1 md:flex-none bg-purple-100 text-purple-700 text-xs font-black px-4 py-2.5 rounded-xl transition-colors uppercase tracking-widest">Todo</button>
            </div>
            <div class="flex flex-col md:flex-row gap-2 w-full md:w-auto">
                <input type="date" id="filtro-fecha-inicio" onchange="cargarDatosAdmin()" class="bg-slate-50 border border-slate-200 text-slate-700 text-sm font-bold rounded-xl px-4 py-2.5 outline-none focus:border-purple-400 transition-colors w-full md:w-auto">
                <input type="date" id="filtro-fecha-fin" onchange="cargarDatosAdmin()" class="bg-slate-50 border border-slate-200 text-slate-700 text-sm font-bold rounded-xl px-4 py-2.5 outline-none focus:border-purple-400 transition-colors w-full md:w-auto">
            </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <div class="glass p-5 rounded-3xl shadow-sm text-center transform transition hover:scale-105 border-b-4 border-purple-500">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Total Estudios</p>
                <p id="kpi-total" class="text-4xl font-black text-purple-600 mt-1">0</p>
            </div>
            <div class="glass p-5 rounded-3xl shadow-sm text-center transform transition hover:scale-105 border-b-4 border-sky-500">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Sucursales</p>
                <p id="kpi-sucursal" class="text-4xl font-black text-sky-600 mt-1">0</p>
            </div>
            <div class="glass p-5 rounded-3xl shadow-sm text-center transform transition hover:scale-105 border-b-4 border-orange-500">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Foráneos</p>
                <p id="kpi-foraneo" class="text-4xl font-black text-orange-600 mt-1">0</p>
            </div>
            <div class="glass p-5 rounded-3xl shadow-sm text-center transform transition hover:scale-105 border-b-4 border-emerald-500">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Empresas</p>
                <p id="kpi-empresas" class="text-4xl font-black text-emerald-600 mt-1">0</p>
            </div>
        </div>

        <div class="glass rounded-3xl overflow-hidden shadow-sm flex flex-col min-h-[500px] border border-slate-200">
            <div class="p-4 border-b border-slate-200 bg-slate-50 flex justify-between items-center">
                <h3 class="font-black text-xs text-slate-700 uppercase tracking-widest flex items-center gap-2"><i class="fa-solid fa-table-list text-purple-500"></i> Base de Datos Cruda</h3>
                <div class="relative w-64">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-slate-400 text-xs"></i>
                    <input type="text" id="buscador-tabla" onkeyup="filtrarTablaAdmin()" placeholder="Buscar empresa, médico..." class="w-full pl-8 pr-3 py-2 bg-white border border-slate-200 rounded-lg text-xs font-bold outline-none focus:border-purple-400 transition-colors">
                </div>
            </div>
            <div class="overflow-x-auto scroll-custom flex-1">
                <table class="w-full text-left border-collapse min-w-[800px]">
                    <thead class="bg-white text-[10px] uppercase text-slate-400 font-black tracking-widest border-b border-slate-200 sticky top-0 z-10 shadow-sm">
                        <tr>
                            <th class="p-4">Origen / ID</th>
                            <th class="p-4">Fecha</th>
                            <th class="p-4">Médico</th>
                            <th class="p-4">Lugar (Sucursal/Empresa)</th>
                            <th class="p-4">Detalle / Estudios</th>
                            <th class="p-4 text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-registros" class="divide-y divide-slate-100 text-sm font-medium text-slate-700">
                        <tr><td colspan="6" class="text-center py-10 text-slate-400 italic">Cargando base de datos...</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="p-4 bg-slate-50 border-t border-slate-200 flex justify-between items-center text-xs font-bold text-slate-500">
                <span id="info-paginacion">Mostrando 0 registros</span>
                <div class="flex gap-2">
                    <button onclick="cambiarPagina(-1)" class="px-3 py-1.5 bg-white border border-slate-200 rounded hover:bg-slate-100 transition"><i class="fa-solid fa-chevron-left"></i></button>
                    <button onclick="cambiarPagina(1)" class="px-3 py-1.5 bg-white border border-slate-200 rounded hover:bg-slate-100 transition"><i class="fa-solid fa-chevron-right"></i></button>
                </div>
            </div>
        </div>

    </main>

    <script>
        let registrosGlobales = [];
        let paginaActual = 1;
        const regsPorPagina = 50;

        window.iniciarAdmin = async function() {
            aplicarFiltroRapido('semana');
        };

        window.aplicarFiltroRapido = function(tipo) {
            const hoy = new Date();
            let iStr = '', fStr = `${hoy.getFullYear()}-${String(hoy.getMonth() + 1).padStart(2, '0')}-${String(hoy.getDate()).padStart(2, '0')}`;
            if (tipo === 'hoy') iStr = fStr; 
            else if (tipo === 'ayer') { const ayer = new Date(); ayer.setDate(ayer.getDate() - 1); iStr = `${ayer.getFullYear()}-${String(ayer.getMonth() + 1).padStart(2, '0')}-${String(ayer.getDate()).padStart(2, '0')}`; fStr = iStr; }
            else if (tipo === 'semana') { const diff = hoy.getDate() - hoy.getDay() + 1; iStr = `${hoy.getFullYear()}-${String(hoy.getMonth() + 1).padStart(2, '0')}-${String(new Date(hoy.setDate(diff)).getDate()).padStart(2, '0')}`; }
            else if (tipo === 'todo') { iStr = ''; fStr = ''; }
            
            document.getElementById('filtro-fecha-inicio').value = iStr; 
            document.getElementById('filtro-fecha-fin').value = fStr;
            cargarDatosAdmin();
        };

        window.cargarDatosAdmin = async function() {
            const fIni = document.getElementById('filtro-fecha-inicio').value;
            const fFin = document.getElementById('filtro-fecha-fin').value;
            const tbody = document.getElementById('tabla-registros');
            
            tbody.innerHTML = '<tr><td colspan="6" class="text-center py-10 text-slate-400 italic"><i class="fa-solid fa-spinner fa-spin mr-2"></i>Sincronizando con Firebase...</td></tr>';
            registrosGlobales = [];
            
            try {
                let t_Global = 0, t_Suc = 0, t_For = 0;
                let empresas = new Set();

                // 1. FORÁNEOS Y LEGACY
                const q1 = window.query(window.collection(window.db, "registros"), window.orderBy("fecha", "desc"));
                const qs1 = await window.getDocs(q1);
                
                qs1.forEach(doc => {
                    const data = doc.data();
                    if((fIni && data.fecha < fIni) || (fFin && data.fecha > fFin)) return;

                    data.id = doc.id;
                    if(data.tipo === "sucursal") {
                        t_Global++; t_Suc++;
                        registrosGlobales.push({ ...data, dbSource: "registros" });
                    } else if(data.detalles) {
                        empresas.add(data.empresa);
                        let subTotal = 0;
                        data.detalles.forEach(d => subTotal += (parseInt(d.cant) || 1));
                        t_Global += subTotal; t_For += subTotal;
                        registrosGlobales.push({ ...data, dbSource: "registros", subTotal });
                    }
                });

                // 2. SUCURSALES NUEVAS (PWA)
                const q2 = window.query(window.collection(window.db, "registros_diarios_sucursales"), window.orderBy("fecha", "desc"));
                const qs2 = await window.getDocs(q2);
                
                qs2.forEach(doc => {
                    const data = doc.data();
                    if((fIni && data.fecha < fIni) || (fFin && data.fecha > fFin)) return;
                    
                    data.id = doc.id;
                    if(data.estudios) {
                        let subTotal = 0;
                        Object.values(data.estudios).forEach(cant => subTotal += (parseInt(cant) || 0));
                        if(subTotal > 0) {
                            t_Global += subTotal; t_Suc += subTotal;
                            registrosGlobales.push({ ...data, dbSource: "registros_diarios_sucursales", subTotal });
                        }
                    }
                });

                document.getElementById('kpi-total').innerText = t_Global.toLocaleString();
                document.getElementById('kpi-sucursal').innerText = t_Suc.toLocaleString();
                document.getElementById('kpi-foraneo').innerText = t_For.toLocaleString();
                document.getElementById('kpi-empresas').innerText = empresas.size;

                // Ordenar globalmente por fecha descendente
                registrosGlobales.sort((a,b) => b.fecha.localeCompare(a.fecha));
                paginaActual = 1;
                renderizarTablaAdmin();

            } catch(e) {
                console.error("Error BD:", e);
                tbody.innerHTML = '<tr><td colspan="6" class="text-center py-10 text-red-500 font-bold"><i class="fa-solid fa-triangle-exclamation mr-2"></i>Error conectando a la base de datos.</td></tr>';
            }
        };

        window.renderizarTablaAdmin = function() {
            const tbody = document.getElementById('tabla-registros');
            const filtroTxt = document.getElementById('buscador-tabla').value.toLowerCase();
            
            let filtrados = registrosGlobales;
            if(filtroTxt) {
                filtrados = filtrados.filter(r => 
                    (r.medico || '').toLowerCase().includes(filtroTxt) || 
                    (r.sucursal || r.empresa || '').toLowerCase().includes(filtroTxt) ||
                    (r.id || '').toLowerCase().includes(filtroTxt)
                );
            }

            const totalPaginas = Math.ceil(filtrados.length / regsPorPagina);
            if(paginaActual > totalPaginas && totalPaginas > 0) paginaActual = totalPaginas;
            if(paginaActual < 1) paginaActual = 1;

            const inicio = (paginaActual - 1) * regsPorPagina;
            const fin = inicio + regsPorPagina;
            const vista = filtrados.slice(inicio, fin);

            tbody.innerHTML = '';
            
            if(vista.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center py-10 text-slate-400 italic">No hay registros para mostrar.</td></tr>`;
                document.getElementById('info-paginacion').innerText = '0 registros';
                return;
            }

            vista.forEach(r => {
                let badge = '', lugar = '', detalle = '';
                
                if (r.dbSource === "registros_diarios_sucursales") {
                    badge = '<span class="bg-sky-100 text-sky-700 px-2 py-0.5 rounded text-[9px] font-black uppercase tracking-wider border border-sky-200">Sucursal</span>';
                    lugar = `<span class="font-bold text-sky-800">${r.sucursal}</span>`;
                    let desc = Object.entries(r.estudios).map(([k,v]) => `${v} ${k}`).join(', ');
                    detalle = `<span class="font-black text-sky-600 bg-sky-50 px-2 py-1 rounded-lg">${r.subTotal} Total</span> <span class="text-[10px] text-slate-500 ml-1 truncate max-w-[200px] inline-block align-bottom" title="${desc}">${desc}</span>`;
                } else if (r.tipo === "sucursal") {
                    badge = '<span class="bg-slate-100 text-slate-700 px-2 py-0.5 rounded text-[9px] font-black uppercase tracking-wider border border-slate-200">Legado</span>';
                    lugar = `<span class="font-bold text-slate-600">${r.sucursal}</span>`;
                    detalle = `<span class="font-bold text-slate-500">${r.estudio}</span>`;
                } else {
                    badge = '<span class="bg-orange-100 text-orange-700 px-2 py-0.5 rounded text-[9px] font-black uppercase tracking-wider border border-orange-200">Foráneo</span>';
                    lugar = `<span class="font-bold text-orange-800">${r.empresa}</span><br><span class="text-[9px] text-slate-400">Suc: ${r.sucursal || 'N/A'}</span>`;
                    let desc = r.detalles.map(d => `${d.cant || 1} ${d.estudio}`).join(', ');
                    detalle = `<span class="font-black text-orange-600 bg-orange-50 px-2 py-1 rounded-lg">${r.subTotal} Total</span> <span class="text-[10px] text-slate-500 ml-1 truncate max-w-[200px] inline-block align-bottom" title="${desc}">${desc}</span>`;
                }

                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 transition border-b border-slate-100">
                        <td class="p-4"><div class="mb-1">${badge}</div><span class="text-[8px] text-slate-400 font-mono" title="${r.id}">${r.id.substring(0,8)}...</span></td>
                        <td class="p-4 font-bold text-slate-600 text-xs">${r.fecha}</td>
                        <td class="p-4 font-bold text-purple-700 text-xs">${r.medico || 'N/A'}</td>
                        <td class="p-4 text-xs">${lugar}</td>
                        <td class="p-4 text-xs">${detalle}</td>
                        <td class="p-4 text-center">
                            <button onclick="eliminarRegistro('${r.id}', '${r.dbSource}')" class="text-red-400 hover:text-red-600 bg-white hover:bg-red-50 p-2 rounded-lg transition border border-transparent hover:border-red-200 shadow-sm" title="Eliminar Registro"><i class="fa-solid fa-trash-can"></i></button>
                        </td>
                    </tr>
                `;
            });

            document.getElementById('info-paginacion').innerText = `Mostrando ${inicio + 1} - ${Math.min(fin, filtrados.length)} de ${filtrados.length} registros`;
        };

        window.cambiarPagina = function(delta) {
            paginaActual += delta;
            renderizarTablaAdmin();
        };

        window.filtrarTablaAdmin = function() {
            paginaActual = 1;
            renderizarTablaAdmin();
        };

        window.eliminarRegistro = async function(id, sourceCollection) {
            if(!confirm("¿ESTÁS SEGURO? Esta acción borrará el registro de la base de datos oficial y no se puede deshacer.")) return;
            try {
                await window.deleteDoc(window.doc(window.db, sourceCollection, id));
                alert("Registro eliminado con éxito.");
                cargarDatosAdmin();
            } catch(e) {
                console.error("Error al borrar:", e);
                alert("No se pudo eliminar el registro. Verifica permisos.");
            }
        };

    </script>
</body>
</html>
