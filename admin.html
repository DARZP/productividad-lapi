<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - L Suite</title>
    
    <link rel="manifest" href="manifest_admin.json">
    <meta name="theme-color" content="#ea580c">
    <link rel="apple-touch-icon" href="icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        // Importamos los módulos de autenticación
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDW-KIxM3m5QXnfzpOUmwhuLILLAk6u5rA",
            authDomain: "lapi-productividad.firebaseapp.com",
            projectId: "lapi-productividad",
            storageBucket: "lapi-productividad.firebasestorage.app",
            messagingSenderId: "1077149571149",
            appId: "1:1077149571149:web:e1423dde4a8de6f8562404"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // EL GUARDIÁN DE LA PÁGINA
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                // Si no hay sesión, lo regresamos al index y no mostramos la página
                window.location.replace('index.html');
            } else {
                // Si está logueado, quitamos la clase 'hidden' para mostrar el panel
                document.body.classList.remove('hidden');
            }
        });

        // Función para cerrar sesión
        window.cerrarSesionAdmin = () => {
            signOut(auth).then(() => {
                window.location.replace('index.html');
            }).catch((error) => {
                console.error("Error al cerrar sesión", error);
            });
        };
    </script>

    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #ea580c; /* Naranja institucional */
            /* Patrón de puntos sutil de fondo */
            background-image: radial-gradient(rgba(255,255,255,0.15) 1px, transparent 1px); 
            background-size: 24px 24px; 
            -webkit-tap-highlight-color: transparent;
        }
        .glass { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .app-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; text-decoration: none;}
        .app-card:hover { transform: translateY(-5px); background: rgba(255, 255, 255, 0.3); border-color: rgba(255, 255, 255, 0.5); }
        .app-card:active { transform: scale(0.95); }
        
        .animate-fade-in-up { animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(20px); }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
    </style>
</head>
<!-- Agregamos 'hidden' al body. Solo se quitará si Firebase confirma la sesión -->
