<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Panel</title>
    
    <link rel="manifest" href="manifest_admin.json">
    <meta name="theme-color" content="#ea580c">
    <link rel="apple-touch-icon" href="icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(234, 88, 12, 0.2); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass-card:hover { transform: translateY(-5px); border-color: rgba(234, 88, 12, 0.5); box-shadow: 0 10px 25px -5px rgba(234, 88, 12, 0.1), 0 8px 10px -6px rgba(234, 88, 12, 0.1); }
        .glass-card:active { transform: scale(0.95); }
        .animate-fade-in-up { animation: fadeInUp 0.5s ease-out forwards; opacity: 0; transform: translateY(20px); }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center p-6 relative">

    <a href="portal.html" class="absolute top-6 right-6 w-10 h-10 flex items-center justify-center rounded-full bg-white border border-slate-200 text-slate-400 hover:text-orange-500 hover:border-orange-200 shadow-sm transition-all active:scale-95 animate-fade-in-up" title="Volver al Portal Operativo">
        <i class="fa-solid fa-arrow-right-from-bracket text-sm"></i>
    </a>

    <div class="text-center mb-10 w-full max-w-md animate-fade-in-up mt-8">
        <div class="w-20 h-20 bg-white rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-md border border-orange-100">
            <i class="fa-solid fa-user-tie text-4xl text-orange-500"></i>
        </div>
        <h1 class="text-4xl font-black tracking-tight text-slate-800 mb-2">PANEL <span class="text-orange-500">ADMIN</span></h1>
        <p class="text-sm font-medium text-slate-500 tracking-widest uppercase">Gestión Operativa</p>
    </div>

    <!-- CUADRÍCULA RESTRINGIDA (max-w-md) PARA FORZAR PROPORCIÓN CUADRADA -->
    <div class="grid grid-cols-2 gap-4 w-full max-w-md mx-auto">
        
        <a href="admin_monitor.html" class="glass-card rounded-3xl p-6 flex flex-col items-center justify-center text-center gap-3 animate-fade-in-up delay-100 shadow-sm">
            <div class="w-14 h-14 rounded-2xl bg-orange-50 text-orange-600 flex items-center justify-center mb-1">
                <i class="fa-solid fa-server text-2xl"></i>
            </div>
            <div>
                <h3 class="font-black text-sm text-slate-800 uppercase">Monitor</h3>
                <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mt-1">Productividad</p>
            </div>
        </a>

        <a href="reportes.html" class="glass-card rounded-3xl p-6 flex flex-col items-center justify-center text-center gap-3 animate-fade-in-up delay-100 shadow-sm">
            <div class="w-14 h-14 rounded-2xl bg-orange-50 text-orange-600 flex items-center justify-center mb-1">
                <i class="fa-solid fa-chart-pie text-2xl"></i>
            </div>
            <div>
                <h3 class="font-black text-sm text-slate-800 uppercase">Reportes</h3>
                <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mt-1">Productividad</p>
            </div>
        </a>

        <a href="auditoria.html" class="glass-card rounded-3xl p-6 flex flex-col items-center justify-center text-center gap-3 animate-fade-in-up delay-200 shadow-sm">
            <div class="w-14 h-14 rounded-2xl bg-orange-50 text-orange-600 flex items-center justify-center mb-1">
                <i class="fa-solid fa-shield-halved text-2xl"></i>
            </div>
            <div>
                <h3 class="font-black text-sm text-slate-800 uppercase">Auditoría</h3>
                <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mt-1">Cruce de Inf</p>
            </div>
        </a>

        <a href="admin_biologico.html" class="glass-card rounded-3xl p-6 flex flex-col items-center justify-center text-center gap-3 animate-fade-in-up delay-200 shadow-sm">
            <div class="w-14 h-14 rounded-2xl bg-orange-50 text-orange-600 flex items-center justify-center mb-1">
                <i class="fa-solid fa-laptop-medical text-2xl"></i>
            </div>
            <div>
                <h3 class="font-black text-sm text-slate-800 uppercase">Equipos</h3>
                <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mt-1">C. Biológico</p>
            </div>
        </a>

        <!-- EL 5TO ELEMENTO ABARCA LAS DOS COLUMNAS -->
        <a href="admin_unidades.html" class="glass-card rounded-3xl p-6 flex flex-col items-center justify-center text-center gap-3 animate-fade-in-up delay-300 shadow-sm col-span-2">
            <div class="w-14 h-14 rounded-2xl bg-orange-50 text-orange-600 flex items-center justify-center mb-1">
                <i class="fa-solid fa-truck-fast text-2xl"></i>
            </div>
            <div>
                <h3 class="font-black text-sm text-slate-800 uppercase">Unidades Móviles</h3>
                <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mt-1">Control de Reportes</p>
            </div>
        </a>

    </div>

    <div class="mt-16 text-center animate-fade-in-up delay-300">
        <p class="text-[10px] font-bold tracking-widest text-slate-400 uppercase">&copy; 2026</p>
    </div>

</body>
</html>
