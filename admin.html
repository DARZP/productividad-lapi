<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAPI Admin Global Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDW-KIxM3m5QXnfzpOUmwhuLILLAk6u5rA",
            authDomain: "lapi-productividad.firebaseapp.com",
            projectId: "lapi-productividad",
            storageBucket: "lapi-productividad.firebasestorage.app",
            messagingSenderId: "1077149571149",
            appId: "1:1077149571149:web:e1423dde4a8de6f8562404"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.getDocs = getDocs;
        window.collection = collection;
        window.query = query;
        window.orderBy = orderBy;
        
        initDashboard();
    </script>
    
    <style>
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.4); }
        .bg-lapi-orange { background: linear-gradient(135deg, #ff8c00 0%, #ff6a00 100%); }
        .bg-lapi-blue { background: linear-gradient(135deg, #0284c7 0%, #0369a1 100%); }
        body { background-color: #f8fafc; }
        .chart-container { transition: all 0.5s ease-in-out; overflow: hidden; }
        .tab-btn.active { background-color: white; color: #1e293b; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .tab-btn { background-color: rgba(255,255,255,0.2); color: white; }
    </style>
</head>
<body class="font-sans text-slate-800 p-4 md:p-6">

    <div class="max-w-7xl mx-auto">
        <div id="header-box" class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 bg-lapi-orange p-6 rounded-3xl shadow-xl text-white gap-4 transition-colors duration-500">
            <div>
                <h1 class="text-3xl font-black tracking-tight">LAPI Global Admin</h1>
                <p class="opacity-90 text-sm font-medium mt-1 uppercase tracking-widest">Inteligencia de Datos</p>
            </div>
            <div class="flex gap-2 bg-black/10 p-1 rounded-xl w-full md:w-auto">
                <button onclick="cambiarTab('foraneos')" id="btn-tab-foraneos" class="tab-btn active flex-1 md:flex-none px-6 py-2 rounded-lg font-bold text-sm transition">📍 Foráneos</button>
                <button onclick="cambiarTab('sucursales')" id="btn-tab-sucursales" class="tab-btn flex-1 md:flex-none px-6 py-2 rounded-lg font-bold text-sm transition">🏢 Sucursales</button>
            </div>
        </div>

        <div id="seccion-foraneos" class="block">
            <div class="glass p-5 rounded-2xl shadow-sm mb-6 space-y-5 border-l-4 border-orange-500">
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-6 gap-4">
                    <input type="date" id="f-inicio" class="p-2.5 bg-white border rounded-lg text-sm">
                    <input type="date" id="f-fin" class="p-2.5 bg-white border rounded-lg text-sm">
                    <input id="f-empresa" list="lista-empresas-admin" placeholder="Todas las empresas" class="p-2.5 bg-white border rounded-lg text-sm font-bold">
                    <input id="f-medico" list="lista-medicos-admin" placeholder="Todos los médicos" class="p-2.5 bg-white border rounded-lg text-sm font-bold">
                    <button onclick="ejecutarFiltrosForaneos()" class="bg-orange-500 text-white rounded-lg font-bold text-sm">Aplicar</button>
                    <button onclick="exportarExcel(datosFiltradosF, 'Foraneos')" class="bg-emerald-500 text-white rounded-lg font-bold text-sm">Excel</button>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                <div class="glass p-5 rounded-2xl shadow-sm border-b-8 border-orange-500"><p class="text-xs font-black uppercase">Productividad</p><p id="kpi-f-estudios" class="text-3xl font-black mt-1">0</p></div>
                <div class="glass p-5 rounded-2xl shadow-sm border-b-8 border-sky-500"><p class="text-xs font-black uppercase">Tiempo Campo</p><p id="kpi-f-horas" class="text-3xl font-black mt-1">0</p></div>
                <div class="glass p-5 rounded-2xl shadow-sm border-b-8 border-emerald-500"><p class="text-xs font-black uppercase">Empresas</p><p id="kpi-f-empresas" class="text-3xl font-black mt-1">0</p></div>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                <div class="glass p-5 rounded-2xl shadow-sm"><h3 class="font-black text-xs uppercase mb-4 border-b pb-2">Tendencia</h3><div class="relative h-64"><canvas id="cF1"></canvas></div></div>
                <div class="glass p-5 rounded-2xl shadow-sm"><h3 class="font-black text-xs uppercase mb-4 border-b pb-2">Top Médicos</h3><div class="relative h-64"><canvas id="cF2"></canvas></div></div>
            </div>
            <div class="glass p-5 rounded-2xl shadow-sm overflow-hidden"><table class="w-full text-sm"><tbody id="tabla-foraneos"></tbody></table></div>
        </div>

        <div id="seccion-sucursales" class="hidden">
            <div class="glass p-5 rounded-2xl shadow-sm mb-6 border-l-4 border-sky-600">
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-6 gap-4">
                    <input type="date" id="s-inicio" class="p-2.5 bg-white border rounded-lg text-sm">
                    <input type="date" id="s-fin" class="p-2.5 bg-white border rounded-lg text-sm">
                    <select id="s-sucursal" class="p-2.5 bg-white border rounded-lg text-sm font-bold"><option value="Todas">Todas</option></select>
                    <select id="s-medico" class="p-2.5 bg-white border rounded-lg text-sm font-bold"><option value="Todos">Todos</option></select>
                    <button onclick="ejecutarFiltrosSucursales()" class="bg-sky-600 text-white rounded-lg font-bold text-sm">Aplicar</button>
                    <button onclick="exportarExcel(datosFiltradosS, 'Sucursales')" class="bg-emerald-500 text-white rounded-lg font-bold text-sm">Excel</button>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                <div class="glass p-5 rounded-2xl border-b-8 border-sky-600"><p class="text-xs font-black uppercase">Total Estudios</p><p id="kpi-s-estudios" class="text-3xl font-black">0</p></div>
                <div class="glass p-5 rounded-2xl border-b-8 border-indigo-500"><p class="text-xs font-black uppercase">Pacientes</p><p id="kpi-s-pacientes" class="text-3xl font-black">0</p></div>
                <div class="glass p-5 rounded-2xl border-b-8 border-emerald-500"><p class="text-xs font-black uppercase">Médicos</p><p id="kpi-s-personal" class="text-3xl font-black">0</p></div>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                <div class="glass p-5 rounded-2xl h-80"><canvas id="cS1"></canvas></div> <div class="glass p-5 rounded-2xl h-80"><canvas id="cS2"></canvas></div> <div class="glass p-5 rounded-2xl h-80"><canvas id="cS3"></canvas></div> <div class="glass p-5 rounded-2xl h-80"><canvas id="cS4"></canvas></div> </div>
            <div class="glass p-5 rounded-2xl overflow-hidden"><table class="w-full text-sm"><tbody id="tabla-sucursales"></tbody></table></div>
        </div>
    </div>

    <script>
        // Lógica simplificada de agregación
        // ... (Tu lógica anterior + nuevas funciones de renderizado de gráficas abajo)

        function renderSucursales() {
            let tEst = datosFiltradosS.length;
            let pU = new Set(), mU = new Set(), diasSemana={Lunes:0, Martes:0, Miercoles:0, Jueves:0, Viernes:0, Sabado:0, Domingo:0}, sucs={}, tipos={}, meds={};
            
            datosFiltradosS.forEach(d => {
                pU.add(d.paciente); mU.add(d.medico);
                let fechaObj = new Date(d.fecha.replace(/-/g, '/'));
                let dia = ["Domingo","Lunes","Martes","Miercoles","Jueves","Viernes","Sabado"][fechaObj.getDay()];
                diasSemana[dia]++;
                sucs[d.sucursal] = (sucs[d.sucursal]||0)+1;
                tipos[d.estudio] = (tipos[d.estudio]||0)+1;
                meds[d.medico] = (meds[d.medico]||0)+1;
            });

            document.getElementById('kpi-s-estudios').innerText = tEst;
            document.getElementById('kpi-s-pacientes').innerText = pU.size;
            document.getElementById('kpi-s-personal').innerText = mU.size;

            // Renderizar las nuevas gráficas
            dibujarGrafico('cS1', 'bar', Object.keys(diasSemana), Object.values(diasSemana), 'Estudios por Día', '#ed8936');
            let topSucs = Object.entries(sucs).sort((a,b)=>b[1]-a[1]).slice(0,10);
            dibujarGrafico('cS2', 'bar', topSucs.map(x=>x[0]), topSucs.map(x=>x[1]), 'Top 10 Sucursales', '#3182ce');
            dibujarGrafico('cS3', 'pie', Object.keys(tipos), Object.values(tipos), 'Tipo', ['#f687b3','#667eea','#4fd1c5','#f6e05e','#f6ad55']);
            let topMeds = Object.entries(meds).sort((a,b)=>b[1]-a[1]).slice(0,10);
            dibujarGrafico('cS4', 'bar', topMeds.map(x=>x[0]), topMeds.map(x=>x[1]), 'Estudios', '#48bb78');
        }

        // Asegúrate de incluir la función dibujarGrafico que ya teníamos en el código previo.
        // ... el resto de funciones (cambiarTab, ejecutarFiltros, etc.) se mantienen iguales.
    </script>
</body>
</html>
